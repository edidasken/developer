<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Resolve all relative paths from the parent New_Covenant/ directory -->
  <base href="../">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no, date=no, email=no, address=no">
  <title>FlockDocs — Productivity Suite</title>

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="Images/icon-flockos.svg">
  <link rel="apple-touch-icon" href="Images/FlockIcon-512.webp">

  <!-- PWA manifest -->
  <link rel="manifest" href="app.flockdocs/manifest.json">

  <!-- PWA meta -->
  <meta name="theme-color" content="#3b82f6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FlockDocs">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- SEO -->
  <meta name="description" content="FlockDocs — Productivity suite for your church. Word processor, spreadsheets, and document management.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Flash prevention: apply saved FlockOS theme before first paint -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('flock_theme') || 'america';
        document.documentElement.setAttribute('data-theme', t);
      } catch (_) {
        document.documentElement.setAttribute('data-theme', 'america');
      }
    })();
  </script>

  <!-- Styles — new_covenant.css contains all shared styles -->
  <link rel="stylesheet" href="Styles/new_covenant.css">

  <!-- App-specific styles -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    
    html, body {
      height: 100dvh; margin: 0; padding: 0;
      color: var(--ink);
      overflow: hidden;
      overscroll-behavior: none;
    }
    body { background: var(--bg); }

    /* ── Shell grid ──────────────────────────────────────────────────────── */
    .fd-wrap {
      display: grid;
      grid-template-areas: "top top" "side main" "foot foot";
      grid-template-columns: var(--sidebar-w, 256px) 1fr;
      grid-template-rows: calc(var(--topbar-h, 60px) + var(--safe-top, 0px)) 1fr auto;
      height: 100dvh;
      position: relative;
    }
    #fd-topbar-wrap  { grid-area: top; }
    #fd-sidebar-wrap { grid-area: side; overflow-y: auto; overflow-x: hidden; }
    #fd-main         { grid-area: main; overflow-y: auto; overflow-x: hidden; position: relative; }
    #fd-footer       { grid-area: foot; }

    /* Mobile: collapse sidebar */
    @media (max-width: 768px) {
      .fd-wrap {
        grid-template-areas: "top top" "main main" "foot foot";
        grid-template-columns: 1fr;
      }
      #fd-sidebar-wrap {
        position: fixed; top: calc(var(--topbar-h, 60px) + var(--safe-top, 0px));
        left: 0; bottom: 0; width: 280px;
        background: var(--bg-raised);
        border-right: 1px solid var(--line);
        z-index: 300;
        transform: translateX(-100%);
        transition: transform 240ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      #fd-sidebar-wrap.is-open { transform: translateX(0); }
    }

    /* ── Topbar ──────────────────────────────────────────────────────────── */
    #fd-topbar {
      display: flex; align-items: center; gap: 12px;
      width: 100%; padding: var(--safe-top, 0px) 20px 0;
      background: var(--top-bg);
      border-bottom: 1px solid var(--top-line);
      color: var(--top-ink);
      height: calc(var(--topbar-h, 60px) + var(--safe-top, 0px));
      position: relative; z-index: 400;
    }
    #fd-topbar::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 2.5px; pointer-events: none;
      background: var(--grad-rainbow);
      background-size: 200% 100%;
      animation: fd-rainbow 9s linear infinite;
      opacity: 0.72;
    }
    @keyframes fd-rainbow { from { background-position: 0% 0; } to { background-position: 200% 0; } }

    .fd-logo { display: flex; align-items: center; gap: 8px; font: 700 1.1rem var(--font-ui); }
    .fd-logo svg { width: 28px; height: 28px; }
    .fd-spacer { flex: 1; }
    
    .fd-btn-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 8px;
      background: transparent; border: 0; color: var(--top-ink);
      cursor: pointer; transition: background 150ms;
    }
    .fd-btn-icon:hover { background: rgba(255,255,255,0.08); }
    .fd-btn-icon svg { width: 20px; height: 20px; }

    .fd-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 8px;
      background: var(--gold); color: #0c1445;
      font: 600 0.875rem var(--font-ui);
      border: 0; cursor: pointer;
      transition: background 150ms, transform 100ms;
    }
    .fd-btn:hover { background: #f0b534; transform: translateY(-1px); }
    .fd-btn:active { transform: scale(0.97); }
    .fd-btn svg { width: 16px; height: 16px; }

    .fd-btn--ghost {
      background: transparent; color: var(--top-ink);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .fd-btn--ghost:hover { background: rgba(255,255,255,0.08); }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    #fd-sidebar {
      padding: 20px 16px;
      background: var(--bg-raised);
      border-right: 1px solid var(--line);
      height: 100%;
    }

    .fd-sidebar-section {
      margin-bottom: 24px;
    }

    .fd-sidebar-title {
      font: 600 0.75rem var(--font-ui);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
      margin: 0 0 8px 8px;
    }

    .fd-sidebar-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 10px 12px;
      background: transparent; border: 0; border-radius: 8px;
      color: var(--ink); font: 500 0.875rem var(--font-ui);
      text-align: left; cursor: pointer;
      transition: background 150ms;
    }
    .fd-sidebar-btn:hover { background: rgba(255,255,255,0.05); }
    .fd-sidebar-btn.is-active { background: rgba(59,130,246,0.15); color: #3b82f6; }
    .fd-sidebar-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .fd-folder-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px 8px 28px;
      color: var(--ink); font: 500 0.875rem var(--font-ui);
      cursor: pointer; border-radius: 6px;
      transition: background 150ms;
    }
    .fd-folder-item:hover { background: rgba(255,255,255,0.05); }
    .fd-folder-item svg { width: 16px; height: 16px; }

    /* ── Main content area ───────────────────────────────────────────────── */
    .fd-library-view {
      padding: 32px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .fd-library-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px;
    }

    .fd-library-title {
      font: 700 1.75rem var(--font-ui);
      color: var(--ink);
      margin: 0;
    }

    .fd-search-box {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      background: var(--bg-raised);
      border: 1px solid var(--line);
      border-radius: 10px;
      width: 300px;
    }
    .fd-search-box svg { width: 18px; height: 18px; color: var(--ink-muted); }
    .fd-search-box input {
      flex: 1; border: 0; background: transparent;
      color: var(--ink); font: 500 0.875rem var(--font-ui);
      outline: none;
    }
    .fd-search-box input::placeholder { color: var(--ink-muted); }

    /* Document grid */
    .fd-doc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    .fd-doc-card {
      background: var(--bg-raised);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 150ms;
      position: relative;
    }
    .fd-doc-card:hover {
      border-color: #3b82f6;
      box-shadow: 0 4px 16px rgba(59,130,246,0.15);
      transform: translateY(-2px);
    }

    .fd-doc-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
    }
    .fd-doc-icon svg { width: 24px; height: 24px; color: white; }

    .fd-doc-name {
      font: 600 0.938rem var(--font-ui);
      color: var(--ink);
      margin: 0 0 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fd-doc-meta {
      font: 500 0.75rem var(--font-ui);
      color: var(--ink-muted);
    }

    .fd-doc-menu-btn {
      position: absolute;
      top: 12px; right: 12px;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
      border: 0; border-radius: 6px;
      color: var(--ink-muted);
      cursor: pointer;
      opacity: 0;
      transition: opacity 150ms, background 150ms;
    }
    .fd-doc-card:hover .fd-doc-menu-btn { opacity: 1; }
    .fd-doc-menu-btn:hover { background: rgba(255,255,255,0.08); }

    /* Empty state */
    .fd-empty-state {
      text-align: center;
      padding: 80px 20px;
    }
    .fd-empty-state svg {
      width: 80px; height: 80px;
      color: var(--ink-muted);
      opacity: 0.5;
      margin-bottom: 20px;
    }
    .fd-empty-state h3 {
      font: 600 1.25rem var(--font-ui);
      color: var(--ink);
      margin: 0 0 8px;
    }
    .fd-empty-state p {
      font: 500 0.938rem var(--font-ui);
      color: var(--ink-muted);
      margin: 0 0 24px;
    }

    /* ── Editor view ─────────────────────────────────────────────────────── */
    .fd-editor-view {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: var(--bg);
    }

    .fd-editor-toolbar {
      display: flex; align-items: center; gap: 4px;
      padding: 12px 20px;
      background: var(--bg-raised);
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }

    .fd-toolbar-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      background: transparent; border: 0; border-radius: 6px;
      color: var(--ink);
      cursor: pointer;
      transition: background 150ms;
    }
    .fd-toolbar-btn:hover { background: rgba(255,255,255,0.08); }
    .fd-toolbar-btn.is-active { background: rgba(59,130,246,0.2); color: #3b82f6; }
    .fd-toolbar-btn svg { width: 18px; height: 18px; }

    .fd-toolbar-divider {
      width: 1px; height: 24px;
      background: var(--line);
      margin: 0 8px;
    }

    .fd-toolbar-select {
      padding: 6px 10px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--ink);
      font: 500 0.875rem var(--font-ui);
      cursor: pointer;
      outline: none;
    }
    .fd-toolbar-select:hover { border-color: var(--ink-muted); }

    .fd-editor-container {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      background: var(--bg);
    }

    .fd-editor-page {
      max-width: 816px;
      min-height: 1056px;
      margin: 0 auto;
      padding: 96px 96px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      color: #1f2937;
      font: 400 16px/1.6 'Noto Serif', Georgia, serif;
    }

    .fd-editor-content {
      outline: none;
      min-height: 600px;
    }

    .fd-editor-content h1 {
      font: 700 2rem/1.3 var(--font-ui);
      margin: 0 0 16px;
      color: #111827;
    }

    .fd-editor-content h2 {
      font: 700 1.5rem/1.4 var(--font-ui);
      margin: 32px 0 12px;
      color: #111827;
    }

    .fd-editor-content h3 {
      font: 600 1.25rem/1.4 var(--font-ui);
      margin: 24px 0 8px;
      color: #111827;
    }

    .fd-editor-content p {
      margin: 0 0 16px;
    }

    .fd-editor-content ul, .fd-editor-content ol {
      margin: 0 0 16px;
      padding-left: 32px;
    }

    .fd-editor-content li {
      margin-bottom: 8px;
    }

    /* Hidden utility */
    .hidden { display: none !important; }

    /* Footer */
    #fd-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px calc(16px + var(--safe-bottom, 0px));
      background: var(--bg-raised);
      border-top: 1px solid var(--line);
      font: 500 0.813rem var(--font-ui);
      color: var(--ink-muted);
    }
  </style>
</head>
<body>

  <!-- Auth gate placeholder (will be injected by firm_foundation.js) -->
  <div id="auth-gate"></div>

  <!-- Main app shell -->
  <div class="fd-wrap" id="fd-app">
    
    <!-- Topbar -->
    <div id="fd-topbar-wrap">
      <div id="fd-topbar">
        <button class="fd-btn-icon" id="fd-menu-btn" aria-label="Menu">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        
        <div class="fd-logo">
          <svg fill="currentColor" viewBox="0 0 24 24">
            <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <span>FlockDocs</span>
        </div>

        <div class="fd-spacer"></div>

        <button class="fd-btn" id="fd-new-doc-btn">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          New Document
        </button>

        <button class="fd-btn-icon" id="fd-user-menu-btn" aria-label="Account">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Sidebar -->
    <div id="fd-sidebar-wrap">
      <div id="fd-sidebar">
        
        <div class="fd-sidebar-section">
          <div class="fd-sidebar-title">Library</div>
          <button class="fd-sidebar-btn is-active" data-view="all-docs">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            All Documents
          </button>
          <button class="fd-sidebar-btn" data-view="my-docs">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            My Documents
          </button>
          <button class="fd-sidebar-btn" data-view="shared-docs">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            Shared with Church
          </button>
          <button class="fd-sidebar-btn" data-view="recent">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            Recent
          </button>
        </div>

        <div class="fd-sidebar-section">
          <div class="fd-sidebar-title">Folders</div>
          <div id="fd-folders-list">
            <!-- Folders will be injected here -->
          </div>
        </div>

        <div class="fd-sidebar-section">
          <button class="fd-sidebar-btn" data-view="trash">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
            Trash
          </button>
        </div>

      </div>
    </div>

    <!-- Main content -->
    <div id="fd-main">
      
      <!-- Library view -->
      <div class="fd-library-view" id="fd-library-view">
        <div class="fd-library-header">
          <h1 class="fd-library-title" id="fd-library-title">All Documents</h1>
          <div class="fd-search-box">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input type="text" placeholder="Search documents..." id="fd-search-input">
          </div>
        </div>

        <div id="fd-doc-list">
          <!-- Documents will be injected here -->
          <div class="fd-empty-state">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <h3>No documents yet</h3>
            <p>Create your first document to get started</p>
            <button class="fd-btn" onclick="FlockDocs.createNewDocument()">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              Create Document
            </button>
          </div>
        </div>
      </div>

      <!-- Editor view -->
      <div class="fd-editor-view hidden" id="fd-editor-view">
        <div class="fd-editor-toolbar">
          <button class="fd-toolbar-btn" data-action="back" title="Back to library">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
          </button>

          <div class="fd-toolbar-divider"></div>

          <select class="fd-toolbar-select" id="fd-format-select">
            <option value="p">Paragraph</option>
            <option value="h1">Heading 1</option>
            <option value="h2">Heading 2</option>
            <option value="h3">Heading 3</option>
          </select>

          <div class="fd-toolbar-divider"></div>

          <button class="fd-toolbar-btn" data-format="bold" title="Bold">
            <svg fill="currentColor" viewBox="0 0 24 24">
              <path d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM10 6.5h3c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-3v-3zm3.5 9H10v-3h3.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5z"/>
            </svg>
          </button>

          <button class="fd-toolbar-btn" data-format="italic" title="Italic">
            <svg fill="currentColor" viewBox="0 0 24 24">
              <path d="M10 4v3h2.21l-3.42 8H6v3h8v-3h-2.21l3.42-8H18V4z"/>
            </svg>
          </button>

          <button class="fd-toolbar-btn" data-format="underline" title="Underline">
            <svg fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 17c3.31 0 6-2.69 6-6V3h-2.5v8c0 1.93-1.57 3.5-3.5 3.5S8.5 12.93 8.5 11V3H6v8c0 3.31 2.69 6 6 6zm-7 2v2h14v-2H5z"/>
            </svg>
          </button>

          <div class="fd-toolbar-divider"></div>

          <button class="fd-toolbar-btn" data-format="insertUnorderedList" title="Bullet list">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>

          <button class="fd-toolbar-btn" data-format="insertOrderedList" title="Numbered list">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20h10M7 16h10M7 12h10M7 8h10M3 20h1m0 0v-2m0 2v2m0-8h1m0 0V8m0 4v4m0-8h1m0 0V3m0 1v1"/>
            </svg>
          </button>

          <div class="fd-toolbar-divider"></div>

          <button class="fd-toolbar-btn" data-format="justifyLeft" title="Align left">
            <svg fill="currentColor" viewBox="0 0 24 24">
              <path d="M3 3h18v2H3V3zm0 8h12v2H3v-2zm0 8h18v2H3v-2zm0-4h12v2H3v-2zm0-8h18v2H3V7z"/>
            </svg>
          </button>
