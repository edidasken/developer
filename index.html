<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlockOS Dev — Deployment Viewer</title>
  <link rel="icon" type="image/png" href="New_Covenant/Images/FlockIcon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; height: 100dvh; overflow: hidden; background: #f5f0e8; }

    #herald-frame {
      display: block;
      border: none;
      width: 100%;
      height: 100%;
      height: 100dvh;
    }

    /* ── Deployment selector pill — bottom-right fixed ───────────────── */
    #deploy-pill {
      position: fixed;
      bottom: max(16px, env(safe-area-inset-bottom, 16px));
      right:  max(16px, env(safe-area-inset-right,  16px));
      z-index: 9999;
      display: none; /* shown after init */
    }

    /* Matches fn-back-btn style exactly, with gold border to distinguish */
    #deploy-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 11.5px;
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #e8a838;
      background: #162858;
      border: 1.5px solid #e8a838;
      border-radius: 999px;
      padding: 7px 14px 7px 11px;
      cursor: pointer;
      white-space: nowrap;
      line-height: 1;
      min-height: 36px; /* adequate tap target */
      -webkit-tap-highlight-color: transparent;
    }
    #deploy-btn:hover { background: #1e3472; }
    #deploy-chevron { transition: transform .18s ease; }
    #deploy-btn[aria-expanded="true"] #deploy-chevron { transform: rotate(180deg); }

    /* Dropdown — always opens upward from bottom-right pill */
    #deploy-menu {
      position: absolute;
      bottom: calc(100% + 8px); /* opens upward */
      top: auto;
      right: 0;                 /* right-aligned */
      left: auto;
      z-index: 9998;
      min-width: 220px;
      max-width: calc(100vw - 24px);
      background: #0c1445;
      border-radius: 12px;
      box-shadow: 0 -4px 24px rgba(12,20,69,.45), 0 8px 40px rgba(12,20,69,.55);
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    #deploy-menu[hidden] { display: none !important; }
    /* Mobile: bigger tap targets */
    @media (max-width: 639px) {
      .deploy-item { padding: 11px 14px; }
    }

    .deploy-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-radius: 8px;
      cursor: pointer;
      color: rgba(255,255,255,0.75);
      font-family: system-ui, -apple-system, sans-serif;
      text-decoration: none;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: background .12s;
    }
    .deploy-item:hover { background: rgba(255,255,255,.08); color: #fff; }
    .deploy-item.active { background: rgba(232,168,56,.14); color: #e8a838; }
    .deploy-item-name { font-size: 13px; font-weight: 700; display: block; }
    .deploy-item-folder { font-size: 10.5px; opacity: 0.5; display: block; margin-top: 1px; }
  </style>
</head>
<body>

  <!-- Deployment selector — positioned by JS next to Herald's SELECT AN APP button -->
  <div id="deploy-pill">
    <button id="deploy-btn" aria-haspopup="true" aria-expanded="false" onclick="toggleDeployMenu(event)">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <span id="deploy-label">Loading…</span>
      <svg id="deploy-chevron" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div id="deploy-menu" hidden></div>
  </div>

  <iframe id="herald-frame" src="" title="The Flock Herald — Dev Viewer"></iframe>

  <script>
  var _deployments = [];
  var _active = localStorage.getItem('devDeployment') || 'Root';

  // ── Short labels shown in the pill button (compact for the header) ────
  var LABEL_SHORT = {
    'New_Covenant': 'New Covenant',
    'Root':         'FlockOS',
    'FlockOS':      'FlockOS',
    'TBC':          'Trinity',
    'TheForest':    'The Forest',
    'GAS':          'Dev'
  };

  // ── Preferred sort order (unknown folders appended after) ─────────────
  var FOLDER_ORDER = ['New_Covenant', 'Root', 'FlockOS', 'TBC', 'TheForest', 'GAS'];

  function sortOrder(folder) {
    var i = FOLDER_ORDER.indexOf(folder);
    return i === -1 ? 999 : i;
  }

  // ── Discover Nations/* subfolders via directory listing ───────────────
  async function discoverDeployments() {
    try {
      var res = await fetch('Nations/');
      if (!res.ok) return [];
      var html = await res.text();
      var folders = [];
      var re = /href="([A-Za-z][^"\/]*)\/"/g;
      var m;
      while ((m = re.exec(html)) !== null) {
        folders.push(m[1]);
      }
      return folders;
    } catch (_) { return []; }
  }

  // ── Get full church name from manifest (used in dropdown only) ────────
  async function getName(folder) {
    try {
      var res = await fetch('Nations/' + folder + '/manifest.json');
      if (!res.ok) return folder;
      var d = await res.json();
      return d.name || folder;
    } catch (_) { return folder; }
  }

  // ── Build dropdown menu ───────────────────────────────────────────────
  function buildMenu() {
    var menu = document.getElementById('deploy-menu');
    menu.innerHTML = '';
    _deployments.forEach(function(d) {
      var btn = document.createElement('button');
      btn.className = 'deploy-item' + (d.folder === _active ? ' active' : '');
      var pathLabel = d.folder === 'New_Covenant' ? 'New_Covenant/' : 'Nations/' + d.folder;
      btn.innerHTML =
        '<div>' +
          '<span class="deploy-item-name">' + _esc(d.name) + '</span>' +
          '<span class="deploy-item-folder">' + _esc(pathLabel) + '</span>' +
        '</div>';
      btn.addEventListener('click', function() { switchDeployment(d.folder); });
      menu.appendChild(btn);
    });
  }

  function _esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Switch deployment ─────────────────────────────────────────────────
  function switchDeployment(folder) {
    _active = folder;
    localStorage.setItem('devDeployment', folder);
    document.getElementById('deploy-label').textContent = LABEL_SHORT[folder] || folder;
    buildMenu();
    closeDeployMenu();
    var frame = document.getElementById('herald-frame');
    frame.src = folder === 'New_Covenant'
      ? 'New_Covenant/app.flocknews/flocknews.html'
      : 'Nations/' + folder + '/app.flocknews/flocknews.html';
  }

  // ── Show pill — position is pure CSS (bottom-right fixed) ───────────
  function positionPill() {
    document.getElementById('deploy-pill').style.display = 'block';
  }

  // ── Menu open/close ───────────────────────────────────────────────────
  function toggleDeployMenu(e) {
    e.stopPropagation();
    var menu = document.getElementById('deploy-menu');
    var btn  = document.getElementById('deploy-btn');
    var open = !menu.hidden;
    menu.hidden = open;
    btn.setAttribute('aria-expanded', String(!open));
  }

  function closeDeployMenu() {
    document.getElementById('deploy-menu').hidden = true;
    document.getElementById('deploy-btn').setAttribute('aria-expanded', 'false');
  }

  document.addEventListener('click', function(e) {
    if (!document.getElementById('deploy-pill').contains(e.target)) {
      closeDeployMenu();
    }
  });

  // ── Init ──────────────────────────────────────────────────────────────
  (async function init() {
    var folders = await discoverDeployments();
    if (!folders.length) folders = ['Root', 'FlockOS', 'TBC', 'TheForest', 'GAS'];

    var names = await Promise.all(folders.map(getName));
    var discovered = folders.map(function(f, i) { return { folder: f, name: names[i] }; });

    // Prepend New_Covenant as the pinned first entry
    var ncEntry = { folder: 'New_Covenant', name: 'New Covenant (source)' };
    var all = [ncEntry].concat(discovered);

    // Apply preferred sort order (New_Covenant stays first via index 0 in FOLDER_ORDER)
    all.sort(function(a, b) { return sortOrder(a.folder) - sortOrder(b.folder); });
    _deployments = all;

    // Validate saved selection
    if (!_deployments.find(function(d) { return d.folder === _active; })) {
      _active = 'Root';
    }

    document.getElementById('deploy-label').textContent = LABEL_SHORT[_active] || _active;
    buildMenu();

    // Load the Herald for the active deployment
    var frame = document.getElementById('herald-frame');
    frame.addEventListener('load', function() { positionPill(); });
    frame.src = _active === 'New_Covenant'
      ? 'New_Covenant/app.flocknews/flocknews.html'
      : 'Nations/' + _active + '/app.flocknews/flocknews.html';
  })();
  </script>

</body>
</html>
