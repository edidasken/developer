<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Resolve all relative paths from the parent New_Covenant/ directory -->
  <base href="../">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <title>FlockNews — Daily Spiritual Content</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f1735">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FlockNews">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/svg+xml" href="Images/icon-flocknews.svg">
  <link rel="apple-touch-icon" href="Images/icon-flocknews.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Flash prevention -->
  <script>
    (function () {
      try { var t = localStorage.getItem('flock_theme') || 'america'; document.documentElement.setAttribute('data-theme', t); }
      catch (_) { document.documentElement.setAttribute('data-theme', 'america'); }
    })();
  </script>

  <!-- Shared FlockOS styles -->
  <link rel="stylesheet" href="Styles/new_covenant.css">

  <!-- Firebase config — B-Build patches per church -->
  <script>
    window.FLOCK_FIREBASE_CONFIG = {
      apiKey:            'AIzaSyCNKg8ePmDHxOzANIqNuaJVsqTgFy6K0Sk',
      authDomain:        'flockos-notify.firebaseapp.com',
      projectId:         'flockos-notify',
      storageBucket:     'flockos-notify.firebasestorage.app',
      messagingSenderId: '621583165877',
      appId:             '1:621583165877:web:3b17b9eca23e4a1bfe7b56'
    };
    window.FLOCK_CHURCH_ID = window.FLOCK_CHURCH_ID || 'root';
  </script>

  <!-- FlockNews-specific styles — edit app.flocknews/flocknews.css -->
  <link rel="stylesheet" href="app.flocknews/flocknews.css">
</head>
<body>

<!-- Unity Header -->
<div id="unityHeader"></div>

<div id="fn-page">
  <div id="fn-scroll-shell">
    <div class="fn-inner">

      <!-- ═══════════════ MASTHEAD ═══════════════════ -->
      <header class="fn-masthead">
        <div class="fn-masthead-flag" id="fn-church-name">Flock News</div>
        <hr class="fn-masthead-rule">
        <p class="fn-masthead-tagline" id="fn-tagline">News · Scripture · Devotion</p>
        <div class="fn-masthead-dateline">
          <span id="fn-current-date">Today</span>
        </div>
        <div id="fn-editor-link-wrap">
          <a href="app.flocknews/flocknews-editor.html" style="font-family:var(--ui);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);text-decoration:none;border-bottom:1px solid rgba(232,168,56,0.4);padding-bottom:2px;">✏ Edit Today's Edition</a>
        </div>
      </header>

      <!-- ═══════════════ LOADING ════════════════════ -->
      <div id="fn-loading">Loading today's edition…</div>

      <!-- ═══════════════ NEWS FEED ══════════════════ -->
      <div id="fn-news-feed">

        <!-- ── INTRODUCTION (full width) ─────────── -->
        <article class="fn-section" data-section="introduction">
          <div class="fn-section-inner">
            <div class="fn-section-label">Welcome</div>
            <div class="fn-body" id="fn-introduction-content">
              <!-- renderIntroduction() populates this -->
            </div>
          </div>
        </article>

        <!-- ── PASTOR'S HEART + ANNOUNCEMENTS ─────── -->
        <div class="fn-row">
          <article class="fn-section fn-col-wide" data-section="pastorHeart">
            <div class="fn-section-inner">
              <div class="fn-section-label">Pastor's Heart</div>
              <div class="fn-body" id="fn-pastorHeart-content">
                <!-- renderPastorHeart() populates this -->
              </div>
            </div>
          </article>

          <article class="fn-section fn-col-narrow" data-section="announcements">
            <div class="fn-section-inner">
              <div class="fn-section-label">Announcements</div>
              <div class="fn-body" id="fn-announcements-content">
                <!-- renderAnnouncements() populates this -->
              </div>
            </div>
          </article>
        </div>

        <!-- ── MISSION (full width) ───────────────── -->
        <article class="fn-section" data-section="mission">
          <div class="fn-section-inner">
            <div class="fn-section-label">Mission of the Day</div>
            <div id="fn-mission-content">
              <!-- renderMission() populates this -->
            </div>
          </div>
        </article>

        <!-- ── READING + DEVOTIONAL ───────────────── -->
        <div class="fn-row">
          <article class="fn-section fn-col-half" data-section="reading">
            <div class="fn-section-inner">
              <div class="fn-section-label">Bible Reading</div>
              <div class="fn-body" id="fn-reading-content">
                <!-- renderReading() populates this -->
              </div>
            </div>
          </article>

          <article class="fn-section fn-col-half" data-section="devotional">
            <div class="fn-section-inner">
              <div class="fn-section-label">Daily Devotional</div>
              <div class="fn-body" id="fn-devotional-content">
                <!-- renderDevotional() populates this -->
              </div>
            </div>
          </article>
        </div>

        <!-- ── WORD OF THE DAY + BOOK OF THE DAY ─── -->
        <div class="fn-row">
          <article class="fn-section fn-col-half" data-section="words">
            <div class="fn-section-inner">
              <div class="fn-section-label">Word of the Day</div>
              <div class="fn-words-grid">
                <div class="fn-word-panel" id="fn-greek-word">
                  <!-- renderWords() populates this -->
                </div>
                <div class="fn-word-panel" id="fn-hebrew-word">
                  <!-- renderWords() populates this -->
                </div>
              </div>
            </div>
          </article>

          <article class="fn-section fn-col-half" data-section="book">
            <div class="fn-section-inner">
              <div class="fn-section-label">Bible Book of the Day</div>
              <div class="fn-book-content-body" id="fn-book-content">
                <!-- renderBook() populates this -->
              </div>
            </div>
          </article>
        </div>

        <!-- Bottom double rule -->
        <hr class="fn-double-rule">

      </div><!-- #fn-news-feed -->

    </div><!-- .fn-inner -->
  </div><!-- #fn-scroll-shell -->
</div><!-- #fn-page -->

<!-- Edit toggle FAB (pastor+ only) -->
<button id="fn-edit-toggle" onclick="document.dispatchEvent(new CustomEvent('fn-edit-mode-toggle'))">
  ✏ Edit
</button>

<!-- SW update banner -->
<div id="fn-update-banner">
  <span>A new version of FlockNews is available.</span>
  <button onclick="window.FlockNews?.doUpdate()">Update Now</button>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js" defer></script>

<!-- FlockOS core scripts -->
<script defer src="Scripts/firm_foundation.js"></script>
<script defer src="Scripts/the_upper_room.js"></script>
<script defer src="Scripts/the_true_vine.js"></script>

<!-- FlockNews app module -->
<script src="app.flocknews/flocknews.js" type="module"></script>

</body>
</html>
