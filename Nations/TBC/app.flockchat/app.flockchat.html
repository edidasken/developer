<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <base href="../">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <title>FlockChat</title>
  <link rel="icon" type="image/png" href="Images/icon-chat.svg">
  <link rel="apple-touch-icon" href="Images/icon-chat.svg">
  <link rel="manifest" href="app.flockchat/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FlockChat">
  <meta name="theme-color" content="#06b6d4">
  <meta name="description" content="FlockChat — Beautiful church messaging">

  <!-- Preconnect to fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Theme bootstrap (before stylesheet to prevent flash) -->
  <script>(function(){var t=localStorage.getItem('flock_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>

  <!-- Shared stylesheet -->
  <link rel="stylesheet" href="Styles/new_covenant.css">

  <style>
    /* ─── Reset ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100dvh; overflow: hidden; overscroll-behavior: none; }

    /* ─── Design Tokens (iMessage-inspired) ──────────────────────────── */
    :root {
      /* Core surfaces */
      --fc-bg:          #f7f8fb;
      --fc-surface:     #ffffff;
      --fc-panel:       #f0f2f5;
      
      /* Message bubbles */
      --fc-received-bg: #e9ecef;
      --fc-received-text: #1b264f;
      --fc-sent-bg:     #007aff;  /* iOS blue */
      --fc-sent-text:   #ffffff;
      
      /* Text */
      --fc-text:        #1b264f;
      --fc-text-muted:  #6c757d;
      --fc-text-light:  #adb5bd;
      
      /* Borders & dividers */
      --fc-border:      #dee2e6;
      --fc-divider:     #e9ecef;
      
      /* Special types */
      --fc-prayer:      #a855f7;
      --fc-announcement: #f59e0b;
      --fc-unread:      #007aff;
      
      /* Shadows */
      --fc-shadow-sm:   0 1px 2px rgba(0,0,0,0.05);
      --fc-shadow-md:   0 4px 6px rgba(0,0,0,0.07);
      --fc-shadow-lg:   0 10px 15px rgba(0,0,0,0.10);
      
      /* Safe areas */
      --safe-top:       env(safe-area-inset-top, 0px);
      --safe-bottom:    env(safe-area-inset-bottom, 0px);
      
      --font: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      background: var(--fc-bg);
      color: var(--fc-text);
    }

    /* ─── Boot Splash ────────────────────────────────────────────────── */
    #fc-boot {
      position: fixed; inset: 0;
      background: var(--fc-bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.25rem; z-index: 9000;
      transition: opacity 0.3s ease;
    }
    #fc-boot.fade-out { opacity: 0; pointer-events: none; }
    .fc-boot-icon {
      width: 84px; height: 84px;
      border-radius: 22px;
      background: linear-gradient(135deg, #0c4a6e 0%, #06b6d4 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 14px 40px rgba(6, 182, 212, .35), 0 4px 12px rgba(0,0,0,.18);
    }
    .fc-boot-icon svg {
      width: 44px; height: 44px;
      stroke: #fff;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .fc-boot-name {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -.02em;
      color: var(--fc-text);
      margin-top: .25rem;
    }
    .fc-boot-spinner {
      width: 28px; height: 28px;
      border: 2.5px solid var(--fc-border);
      border-top-color: #06b6d4;
      border-radius: 50%;
      animation: fc-spin 0.8s linear infinite;
    }
    @keyframes fc-spin { to { transform: rotate(360deg); } }
    .fc-boot-status {
      font-size: 0.875rem;
      color: var(--fc-text-muted);
    }

    /* ─── App Shell ──────────────────────────────────────────────────── */
    #fc-app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }
    #fc-app[hidden] { display: none; }

    /* ─── Top Bar (Unity Header) ─────────────────────────────────────── */
    #fc-topbar { z-index: 100; }

    /* ─── Main Container (2-col on desktop, single col on mobile) ───── */
    .fc-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ─── Conversation List Pane ─────────────────────────────────────── */
    .fc-list-pane {
      width: 380px;
      flex-shrink: 0;
      background: var(--fc-surface);
      border-right: 1px solid var(--fc-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .fc-list-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--fc-divider);
      background: var(--fc-surface);
    }
    .fc-list-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .fc-list-title {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--fc-text);
    }
    .fc-new-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--fc-sent-bg);
      border: none;
      color: white;
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s, opacity 0.12s;
      flex-shrink: 0;
    }
    .fc-new-btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
    .fc-list-search {
      width: 100%;
      padding: 10px 14px;
      background: var(--fc-panel);
      border: 1px solid transparent;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 0.9375rem;
      color: var(--fc-text);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .fc-list-search:focus {
      background: var(--fc-surface);
      border-color: var(--fc-sent-bg);
    }
    .fc-list-search::placeholder {
      color: var(--fc-text-light);
    }

    .fc-list-scroll {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    .fc-list-scroll::-webkit-scrollbar { width: 0; }

    /* ─── Conversation List Item ─────────────────────────────────────── */
    .fc-conv-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      background: var(--fc-surface);
      border-bottom: 1px solid var(--fc-divider);
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
    }
    .fc-conv-item:hover {
      background: var(--fc-panel);
    }
    .fc-conv-item.active {
      background: var(--fc-panel);
    }
    .fc-conv-item.unread {
      background: color-mix(in srgb, var(--fc-sent-bg) 4%, var(--fc-surface));
    }

    /* ─── iOS-style Pinned Section ───────────────────────────────────── */
    .fc-pinned-section {
      padding: 14px 20px 16px;
      background: var(--fc-surface);
      border-bottom: 1px solid var(--fc-divider);
    }
    .fc-pinned-header {
      display: flex; align-items: center; gap: 5px;
      margin-bottom: 14px;
    }
    .fc-pinned-header-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
      color: var(--fc-text-muted); text-transform: uppercase;
    }
    .fc-pinned-header-icon {
      font-size: 10px; opacity: 0.55;
    }
    .fc-pinned-grid {
      display: flex; gap: 8px;
    }
    .fc-pinned-item {
      display: flex; flex-direction: column; align-items: center;
      flex: 1; max-width: 88px; gap: 7px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .fc-pinned-bubble {
      width: 62px; height: 62px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.75rem;
      position: relative;
      transition: transform 0.13s ease, box-shadow 0.13s ease;
      flex-shrink: 0;
    }
    .fc-pinned-item:hover .fc-pinned-bubble,
    .fc-pinned-item:active .fc-pinned-bubble { transform: scale(0.94); }
    .fc-pinned-item.active .fc-pinned-bubble {
      box-shadow: 0 0 0 3px var(--fc-sent-bg);
    }
    .fc-pinned-bubble.announcement {
      background: linear-gradient(145deg, #f59e0b, #d97706);
    }
    .fc-pinned-bubble.prayer {
      background: linear-gradient(145deg, #a855f7, #7c3aed);
    }
    .fc-pinned-badge {
      position: absolute; top: -1px; right: -1px;
      background: #ff3b30; color: #fff; border-radius: 10px;
      font-size: 10px; font-weight: 700; min-width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px; border: 2px solid var(--fc-surface);
    }
    .fc-pinned-name {
      font-size: 11.5px; font-weight: 500; text-align: center;
      color: var(--fc-text); line-height: 1.3;
      max-width: 80px;
      overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .fc-pinned-preview-dot {
      position: absolute; bottom: 2px; right: 2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--fc-surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; line-height: 1;
    }
    /* Dark mode overrides */
    [data-theme="dark"] .fc-pinned-section { background: var(--fc-panel); }
    [data-theme="dark"] .fc-pinned-badge { border-color: var(--fc-panel); }

    .fc-conv-icon {
      width: 52px; height: 52px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-weight: 600;
    }
    .fc-conv-icon.prayer {
      background: linear-gradient(135deg, var(--fc-prayer), #7c3aed);
    }
    .fc-conv-icon.announcement {
      background: linear-gradient(135deg, var(--fc-announcement), #d97706);
    }
    .fc-conv-icon.dm {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      font-size: 1.125rem;
      font-weight: 700;
    }
    .fc-conv-icon.sms {
      background: linear-gradient(135deg, #34d399, #10b981);
    }
    .fc-user-item.sms .fc-user-avatar {
      background: linear-gradient(135deg, #34d399, #10b981);
    }
    .fc-user-badge {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 6px;
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      border-radius: 999px;
      vertical-align: middle;
    }
    .fc-user-badge.sms {
      background: rgba(16, 185, 129, 0.15);
      color: #10b981;
    }
    .fc-user-badge.muted {
      background: rgba(148, 163, 184, 0.18);
      color: #94a3b8;
    }

    .fc-conv-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .fc-conv-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }
    .fc-conv-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--fc-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fc-conv-time {
      font-size: 0.8125rem;
      color: var(--fc-text-muted);
      flex-shrink: 0;
    }

    .fc-conv-preview {
      font-size: 0.875rem;
      color: var(--fc-text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fc-conv-item.unread .fc-conv-preview {
      font-weight: 500;
      color: var(--fc-text);
    }

    /* ─── Per-row action menu (Archive / Delete) ─────────────────────── */
    .fc-conv-actions-btn {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: var(--fc-text-muted);
      font-size: 1.1rem;
      line-height: 1;
      border-radius: 50%;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.12s, background 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fc-conv-item:hover .fc-conv-actions-btn,
    .fc-conv-actions-btn.open { opacity: 1; }
    .fc-conv-actions-btn:hover { background: var(--fc-divider); }
    @media (hover: none) {
      .fc-conv-actions-btn { opacity: 0.7; }
    }
    .fc-conv-menu {
      position: absolute;
      top: calc(50% + 16px);
      right: 14px;
      background: var(--fc-surface);
      border: 1px solid var(--fc-divider);
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,.12);
      z-index: 20;
      min-width: 160px;
      overflow: hidden;
    }
    .fc-conv-menu button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 14px;
      background: transparent;
      border: none;
      color: var(--fc-text);
      font-size: 0.9rem;
      cursor: pointer;
    }
    .fc-conv-menu button:hover { background: var(--fc-panel); }
    .fc-conv-menu button.danger { color: #ef4444; }

    .fc-archive-toggle {
      width: 100%;
      padding: 12px 20px;
      background: transparent;
      border: none;
      border-top: 1px solid var(--fc-divider);
      color: var(--fc-text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      text-align: center;
    }
    .fc-archive-toggle:hover { background: var(--fc-panel); color: var(--fc-text); }

    .fc-conv-badge {
      position: absolute;
      top: 14px;
      right: 20px;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 10px;
      background: var(--fc-unread);
      color: white;
      font-size: 0.6875rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── Empty State ────────────────────────────────────────────────── */
    .fc-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 60px 40px;
      text-align: center;
    }
    .fc-empty-icon {
      font-size: 4rem;
      opacity: 0.3;
    }
    .fc-empty-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--fc-text);
    }
    .fc-empty-text {
      font-size: 0.9375rem;
      color: var(--fc-text-muted);
      max-width: 320px;
      line-height: 1.5;
    }

    /* ─── Message Thread Pane ────────────────────────────────────────── */
    .fc-thread-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--fc-bg);
      overflow: hidden;
    }

    .fc-thread-header {
      padding: 14px 20px;
      background: var(--fc-surface);
      border-bottom: 1px solid var(--fc-divider);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .fc-thread-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.125rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      flex-shrink: 0;
    }
    .fc-thread-info {
      flex: 1;
      min-width: 0;
    }
    .fc-thread-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--fc-text);
    }
    .fc-thread-meta {
      font-size: 0.8125rem;
      color: var(--fc-text-muted);
    }

    /* ─── Message List ───────────────────────────────────────────────── */
    .fc-messages {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding: 20px 20px 80px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .fc-messages::-webkit-scrollbar { width: 0; }

    /* ─── Message Bubble (iMessage style) ────────────────────────────── */
    .fc-message {
      display: flex;
      gap: 10px;
      max-width: 70%;
      animation: fc-message-in 0.2s ease;
    }
    @keyframes fc-message-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Received messages (left-aligned, gray) */
    .fc-message.received {
      align-self: flex-start;
    }
    .fc-message.received .fc-bubble {
      background: var(--fc-received-bg);
      color: var(--fc-received-text);
      border-radius: 18px 18px 18px 4px;
    }

    /* Sent messages (right-aligned, blue) */
    .fc-message.sent {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .fc-message.sent .fc-bubble {
      background: var(--fc-sent-bg);
      color: var(--fc-sent-text);
      border-radius: 18px 18px 4px 18px;
    }

    .fc-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    .fc-message.sent .fc-avatar {
      display: none;
    }

    .fc-bubble {
      padding: 12px 16px;
      box-shadow: var(--fc-shadow-sm);
      word-wrap: break-word;
      position: relative;
    }

    .fc-message-author {
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 4px;
      opacity: 0.8;
    }
    .fc-message.sent .fc-message-author {
      display: none;
    }

    .fc-message-text {
      font-size: 0.9375rem;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .fc-message-time {
      font-size: 0.6875rem;
      opacity: 0.65;
      margin-top: 4px;
      text-align: right;
    }
    .fc-message.received .fc-message-time {
      text-align: left;
    }

    /* ─── Prayer/Announcement Cards ──────────────────────────────────── */
    .fc-card {
      align-self: stretch;
      max-width: 85%;
      background: var(--fc-surface);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--fc-shadow-md);
      border-left: 4px solid var(--fc-prayer);
    }
    .fc-card.announcement {
      border-left-color: var(--fc-announcement);
    }

    .fc-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .fc-card-icon {
      font-size: 1.25rem;
    }
    .fc-card-author {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--fc-text);
    }
    .fc-card-time {
      font-size: 0.75rem;
      color: var(--fc-text-muted);
      margin-left: auto;
    }

    .fc-card-text {
      font-size: 0.9375rem;
      line-height: 1.5;
      color: var(--fc-text);
      margin-bottom: 12px;
    }

    .fc-card-btn {
      padding: 8px 14px;
      background: var(--fc-panel);
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--fc-prayer);
      cursor: pointer;
      transition: background 0.12s;
    }
    .fc-card-btn:hover {
      background: var(--fc-divider);
    }
    .fc-card.announcement .fc-card-btn {
      color: var(--fc-announcement);
    }

    /* ─── Composer (bottom input) ────────────────────────────────────── */
    .fc-composer {
      background: var(--fc-surface);
      border-top: 1px solid var(--fc-divider);
      padding: 14px 20px calc(14px + var(--safe-bottom));
      display: flex;
      align-items: end;
      gap: 12px;
    }

    .fc-input-wrap {
      flex: 1;
      position: relative;
    }
    .fc-input {
      width: 100%;
      min-height: 40px;
      max-height: 120px;
      padding: 10px 14px;
      background: var(--fc-panel);
      border: 1px solid transparent;
      border-radius: 20px;
      font-family: var(--font);
      font-size: 0.9375rem;
      color: var(--fc-text);
      outline: none;
      resize: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .fc-input:focus {
      background: var(--fc-surface);
      border-color: var(--fc-sent-bg);
    }
    .fc-input::placeholder {
      color: var(--fc-text-light);
    }

    .fc-send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--fc-sent-bg);
      border: none;
      color: white;
      font-size: 1.125rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.12s, opacity 0.12s;
      opacity: 0.5;
    }
    .fc-send-btn:not(:disabled):hover {
      transform: scale(1.05);
    }
    .fc-send-btn:not(:disabled) {
      opacity: 1;
    }
    .fc-send-btn:disabled {
      cursor: not-allowed;
    }

    /* ─── Mobile Responsive ──────────────────────────────────────────── */
    @media (max-width: 768px) {
      .fc-list-pane {
        width: 100%;
        border-right: none;
      }
      .fc-thread-pane {
        position: fixed;
        inset: 0;
        z-index: 200;
        transform: translateX(100%);
        transition: transform 0.25s ease;
      }
      .fc-thread-pane.active {
        transform: translateX(0);
      }
      .fc-thread-header {
        padding-top: calc(14px + var(--safe-top));
      }
      .fc-back-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: none;
        border: none;
        color: var(--fc-sent-bg);
        font-size: 1.25rem;
        cursor: pointer;
        margin-left: -8px;
      }
      .fc-message {
        max-width: 85%;
      }
    }
    @media (min-width: 769px) {
      .fc-back-btn {
        display: none;
      }
    }

    /* ─── Loading Spinner ────────────────────────────────────────────── */
    .fc-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .fc-spinner {
      width: 28px; height: 28px;
      border: 2.5px solid var(--fc-border);
      border-top-color: var(--fc-sent-bg);
      border-radius: 50%;
      animation: fc-spin 0.8s linear infinite;
    }

    /* ─── Toast Notifications ────────────────────────────────────────── */
    #fc-toasts {
      position: fixed;
      top: calc(var(--safe-top) + 20px);
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .fc-toast {
      padding: 14px 18px;
      background: var(--fc-surface);
      border: 1px solid var(--fc-border);
      border-radius: 12px;
      box-shadow: var(--fc-shadow-lg);
      font-size: 0.875rem;
      color: var(--fc-text);
      opacity: 0;
      transform: translateX(100px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: all;
      max-width: 320px;
    }
    .fc-toast.show {
      opacity: 1;
      transform: translateX(0);
    }
    .fc-toast.error {
      border-color: #dc2626;
      background: #fef2f2;
      color: #991b1b;
    }
    .fc-toast.success {
      border-color: #059669;
      background: #ecfdf5;
      color: #065f46;
    }

    /* ─── New Conversation Modal ─────────────────────────────────────── */
    .fc-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 9998;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .fc-modal-backdrop.show {
      opacity: 1;
    }
    .fc-modal {
      background: var(--fc-surface);
      border-radius: 14px;
      box-shadow: var(--fc-shadow-lg);
      width: 90%;
      max-width: 480px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      transform: scale(0.9);
      transition: transform 0.2s;
    }
    .fc-modal-backdrop.show .fc-modal {
      transform: scale(1);
    }
    .fc-modal-header {
      padding: 20px;
      border-bottom: 1px solid var(--fc-divider);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .fc-modal-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--fc-text);
    }
    .fc-modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: none;
      border: none;
      color: var(--fc-text-muted);
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
    }
    .fc-modal-close:hover {
      background: var(--fc-panel);
    }
    .fc-modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }
    .fc-modal-search {
      width: 100%;
      padding: 10px 14px;
      background: var(--fc-panel);
      border: 1px solid transparent;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 0.9375rem;
      color: var(--fc-text);
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.15s;
    }
    .fc-modal-search:focus {
      background: var(--fc-surface);
      border-color: var(--fc-sent-bg);
    }
    .fc-user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .fc-user-item:hover {
      background: var(--fc-panel);
    }
    .fc-user-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .fc-user-info {
      flex: 1;
      min-width: 0;
    }
    .fc-user-name {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--fc-text);
    }
    .fc-user-email {
      font-size: 0.8125rem;
      color: var(--fc-text-muted);
    }
  </style>
</head>
<body>

  <!-- Boot Splash -->
  <div id="fc-boot">
    <div class="fc-boot-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <div class="fc-boot-name">FlockChat</div>
    <div class="fc-boot-spinner"></div>
    <div class="fc-boot-status" id="fc-boot-status">Connecting…</div>
  </div>

  <!-- App -->
  <div id="fc-app" hidden>
    
    <!-- Unity Header (mounted by JS) -->
    <header id="fc-topbar" class="unity-header" role="banner"></header>

    <!-- Main Container -->
    <div class="fc-container">
      
      <!-- Conversation List -->
      <div class="fc-list-pane">
        <div class="fc-list-header">
          <div class="fc-list-title-row">
            <h1 class="fc-list-title">Messages</h1>
            <button class="fc-new-btn" id="fc-new-btn" title="New Conversation">✎</button>
          </div>
          <input type="text" class="fc-list-search" placeholder="Search conversations..." id="fc-search">
        </div>
        <div class="fc-list-scroll" id="fc-list">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Message Thread -->
      <div class="fc-thread-pane" id="fc-thread">
        <div class="fc-thread-header">
          <button class="fc-back-btn" id="fc-back">←</button>
          <div class="fc-thread-icon" id="fc-thread-icon">👥</div>
          <div class="fc-thread-info">
            <div class="fc-thread-name" id="fc-thread-name">Select a conversation</div>
            <div class="fc-thread-meta" id="fc-thread-meta"></div>
          </div>
        </div>
        <div class="fc-messages" id="fc-messages">
          <!-- Messages populated by JS -->
        </div>
        <div class="fc-composer">
          <div class="fc-input-wrap">
            <textarea class="fc-input" id="fc-input" placeholder="FlockChat" rows="1"></textarea>
          </div>
          <button class="fc-send-btn" id="fc-send" disabled>↑</button>
        </div>
      </div>

    </div>

    <!-- Unity Footer removed -->


  </div>

  <!-- Toast Container -->
  <div id="fc-toasts" aria-live="polite"></div>

  <!-- New Conversation Modal -->
  <div class="fc-modal-backdrop" id="fc-new-modal" hidden>
    <div class="fc-modal">
      <div class="fc-modal-header">
        <h2 class="fc-modal-title">New Conversation</h2>
        <button class="fc-modal-close" id="fc-modal-close">&times;</button>
      </div>
      <div class="fc-modal-body">
        <input type="text" class="fc-modal-search" id="fc-user-search" placeholder="Search members...">
        <div id="fc-user-list"></div>
      </div>
    </div>
  </div>
