<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <title>FlockChat</title>
  <link rel="icon" type="image/png" href="../Images/NewCovenant.png">
  <link rel="apple-touch-icon" href="../Images/NewCovenant.png">
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FlockChat">
  <meta name="theme-color" content="#007aff">
  <meta name="description" content="FlockChat — Beautiful church messaging">

  <base href="../">

  <!-- Preconnect to fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Theme bootstrap (before stylesheet to prevent flash) -->
  <script>(function(){var t=localStorage.getItem('flock_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>

  <!-- Shared stylesheet -->
  <link rel="stylesheet" href="Styles/new_covenant.css">

  <style>
    /* ─── Reset ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }

    /* ─── Design Tokens (iMessage-inspired) ──────────────────────────── */
    :root {
      /* Core surfaces */
      --fc-bg:          #f7f8fb;
      --fc-surface:     #ffffff;
      --fc-panel:       #f0f2f5;
      
      /* Message bubbles */
      --fc-received-bg: #e9ecef;
      --fc-received-text: #1b264f;
      --fc-sent-bg:     #007aff;  /* iOS blue */
      --fc-sent-text:   #ffffff;
      
      /* Text */
      --fc-text:        #1b264f;
      --fc-text-muted:  #6c757d;
      --fc-text-light:  #adb5bd;
      
      /* Borders & dividers */
      --fc-border:      #dee2e6;
      --fc-divider:     #e9ecef;
      
      /* Special types */
      --fc-prayer:      #a855f7;
      --fc-announcement: #f59e0b;
      --fc-unread:      #007aff;
      
      /* Shadows */
      --fc-shadow-sm:   0 1px 2px rgba(0,0,0,0.05);
      --fc-shadow-md:   0 4px 6px rgba(0,0,0,0.07);
      --fc-shadow-lg:   0 10px 15px rgba(0,0,0,0.10);
      
      /* Safe areas */
      --safe-top:       env(safe-area-inset-top, 0px);
      --safe-bottom:    env(safe-area-inset-bottom, 0px);
      
      --font: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      background: var(--fc-bg);
      color: var(--fc-text);
    }

    /* ─── Boot Splash ────────────────────────────────────────────────── */
    #fc-boot {
      position: fixed; inset: 0;
      background: var(--fc-bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem; z-index: 9000;
      transition: opacity 0.3s ease;
    }
    #fc-boot.fade-out { opacity: 0; pointer-events: none; }
    .fc-boot-icon {
      width: 72px; height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #007aff, #0051d5);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      box-shadow: var(--fc-shadow-lg);
    }
    .fc-boot-spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--fc-border);
      border-top-color: var(--fc-sent-bg);
      border-radius: 50%;
      animation: fc-spin 0.8s linear infinite;
    }
    @keyframes fc-spin { to { transform: rotate(360deg); } }
    .fc-boot-status {
      font-size: 0.875rem;
      color: var(--fc-text-muted);
    }

    /* ─── App Shell ──────────────────────────────────────────────────── */
    #fc-app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }
    #fc-app[hidden] { display: none; }

    /* ─── Top Bar (Unity Header) ─────────────────────────────────────── */
    #fc-topbar { z-index: 100; }

    /* ─── Main Container (2-col on desktop, single col on mobile) ───── */
    .fc-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ─── Conversation List Pane ─────────────────────────────────────── */
    .fc-list-pane {
      width: 380px;
      flex-shrink: 0;
      background: var(--fc-surface);
      border-right: 1px solid var(--fc-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .fc-list-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--fc-divider);
      background: var(--fc-surface);
    }
    .fc-list-title {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--fc-text);
      margin-bottom: 12px;
    }
    .fc-list-search {
      width: 100%;
      padding: 10px 14px;
      background: var(--fc-panel);
      border: 1px solid transparent;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 0.9375rem;
      color: var(--fc-text);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .fc-list-search:focus {
      background: var(--fc-surface);
      border-color: var(--fc-sent-bg);
    }
    .fc-list-search::placeholder {
      color: var(--fc-text-light);
    }

    .fc-list-scroll {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    .fc-list-scroll::-webkit-scrollbar { width: 0; }

    /* ─── Conversation List Item ─────────────────────────────────────── */
    .fc-conv-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      background: var(--fc-surface);
      border-bottom: 1px solid var(--fc-divider);
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
    }
    .fc-conv-item:hover {
      background: var(--fc-panel);
    }
    .fc-conv-item.active {
      background: var(--fc-panel);
    }
    .fc-conv-item.unread {
      background: color-mix(in srgb, var(--fc-sent-bg) 4%, var(--fc-surface));
    }

    .fc-conv-icon {
      width: 52px; height: 52px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-weight: 600;
    }
    .fc-conv-icon.prayer {
      background: linear-gradient(135deg, var(--fc-prayer), #7c3aed);
    }
    .fc-conv-icon.announcement {
      background: linear-gradient(135deg, var(--fc-announcement), #d97706);
    }
    .fc-conv-icon.dm {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      font-size: 1.125rem;
      font-weight: 700;
    }

    .fc-conv-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .fc-conv-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }
    .fc-conv-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--fc-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fc-conv-time {
      font-size: 0.8125rem;
      color: var(--fc-text-muted);
      flex-shrink: 0;
    }

    .fc-conv-preview {
      font-size: 0.875rem;
      color: var(--fc-text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fc-conv-item.unread .fc-conv-preview {
      font-weight: 500;
      color: var(--fc-text);
    }

    .fc-conv-badge {
      position: absolute;
      top: 14px;
      right: 20px;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 10px;
      background: var(--fc-unread);
      color: white;
      font-size: 0.6875rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── Empty State ────────────────────────────────────────────────── */
    .fc-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 60px 40px;
      text-align: center;
    }
    .fc-empty-icon {
      font-size: 4rem;
      opacity: 0.3;
    }
    .fc-empty-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--fc-text);
    }
    .fc-empty-text {
      font-size: 0.9375rem;
      color: var(--fc-text-muted);
      max-width: 320px;
      line-height: 1.5;
    }

    /* ─── Message Thread Pane ────────────────────────────────────────── */
    .fc-thread-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--fc-bg);
      overflow: hidden;
    }

    .fc-thread-header {
      padding: 14px 20px;
      background: var(--fc-surface);
      border-bottom: 1px solid var(--fc-divider);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .fc-thread-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.125rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      flex-shrink: 0;
    }
    .fc-thread-info {
      flex: 1;
      min-width: 0;
    }
    .fc-thread-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--fc-text);
    }
    .fc-thread-meta {
      font-size: 0.8125rem;
      color: var(--fc-text-muted);
    }

    /* ─── Message List ───────────────────────────────────────────────── */
    .fc-messages {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding: 20px 20px 80px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .fc-messages::-webkit-scrollbar { width: 0; }

    /* ─── Message Bubble (iMessage style) ────────────────────────────── */
    .fc-message {
      display: flex;
      gap: 10px;
      max-width: 70%;
      animation: fc-message-in 0.2s ease;
    }
    @keyframes fc-message-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Received messages (left-aligned, gray) */
    .fc-message.received {
      align-self: flex-start;
    }
    .fc-message.received .fc-bubble {
      background: var(--fc-received-bg);
      color: var(--fc-received-text);
      border-radius: 18px 18px 18px 4px;
    }

    /* Sent messages (right-aligned, blue) */
    .fc-message.sent {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .fc-message.sent .fc-bubble {
      background: var(--fc-sent-bg);
      color: var(--fc-sent-text);
      border-radius: 18px 18px 4px 18px;
    }

    .fc-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    .fc-message.sent .fc-avatar {
      display: none;
    }

    .fc-bubble {
      padding: 12px 16px;
      box-shadow: var(--fc-shadow-sm);
      word-wrap: break-word;
      position: relative;
    }

    .fc-message-author {
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 4px;
      opacity: 0.8;
    }
    .fc-message.sent .fc-message-author {
      display: none;
    }

    .fc-message-text {
      font-size: 0.9375rem;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .fc-message-time {
      font-size: 0.6875rem;
      opacity: 0.65;
      margin-top: 4px;
      text-align: right;
    }
    .fc-message.received .fc-message-time {
      text-align: left;
    }

    /* ─── Prayer/Announcement Cards ──────────────────────────────────── */
    .fc-card {
      align-self: stretch;
      max-width: 85%;
      background: var(--fc-surface);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--fc-shadow-md);
      border-left: 4px solid var(--fc-prayer);
    }
    .fc-card.announcement {
      border-left-color: var(--fc-announcement);
    }

    .fc-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .fc-card-icon {
      font-size: 1.25rem;
    }
    .fc-card-author {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--fc-text);
    }
    .fc-card-time {
      font-size: 0.75rem;
      color: var(--fc-text-muted);
      margin-left: auto;
    }

    .fc-card-text {
      font-size: 0.9375rem;
      line-height: 1.5;
      color: var(--fc-text);
      margin-bottom: 12px;
    }

    .fc-card-btn {
      padding: 8px 14px;
      background: var(--fc-panel);
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--fc-prayer);
      cursor: pointer;
      transition: background 0.12s;
    }
    .fc-card-btn:hover {
      background: var(--fc-divider);
    }
    .fc-card.announcement .fc-card-btn {
      color: var(--fc-announcement);
    }

    /* ─── Composer (bottom input) ────────────────────────────────────── */
    .fc-composer {
      background: var(--fc-surface);
      border-top: 1px solid var(--fc-divider);
      padding: 14px 20px calc(14px + var(--safe-bottom));
      display: flex;
      align-items: end;
      gap: 12px;
    }

    .fc-input-wrap {
      flex: 1;
      position: relative;
    }
    .fc-input {
      width: 100%;
      min-height: 40px;
      max-height: 120px;
      padding: 10px 14px;
      background: var(--fc-panel);
      border: 1px solid transparent;
      border-radius: 20px;
      font-family: var(--font);
      font-size: 0.9375rem;
      color: var(--fc-text);
      outline: none;
      resize: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .fc-input:focus {
      background: var(--fc-surface);
      border-color: var(--fc-sent-bg);
    }
    .fc-input::placeholder {
      color: var(--fc-text-light);
    }

    .fc-send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--fc-sent-bg);
      border: none;
      color: white;
      font-size: 1.125rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.12s, opacity 0.12s;
      opacity: 0.5;
    }
    .fc-send-btn:not(:disabled):hover {
      transform: scale(1.05);
    }
    .fc-send-btn:not(:disabled) {
      opacity: 1;
    }
    .fc-send-btn:disabled {
      cursor: not-allowed;
    }

    /* ─── Mobile Responsive ──────────────────────────────────────────── */
    @media (max-width: 768px) {
      .fc-list-pane {
        width: 100%;
        border-right: none;
      }
      .fc-thread-pane {
        position: fixed;
        inset: 0;
        z-index: 200;
        transform: translateX(100%);
        transition: transform 0.25s ease;
      }
      .fc-thread-pane.active {
        transform: translateX(0);
      }
      .fc-thread-header {
        padding-top: calc(14px + var(--safe-top));
      }
      .fc-back-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: none;
        border: none;
        color: var(--fc-sent-bg);
        font-size: 1.25rem;
        cursor: pointer;
        margin-left: -8px;
      }
      .fc-message {
        max-width: 85%;
      }
    }
    @media (min-width: 769px) {
      .fc-back-btn {
        display: none;
      }
    }

    /* ─── Loading Spinner ────────────────────────────────────────────── */
    .fc-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .fc-spinner {
      width: 28px; height: 28px;
      border: 2.5px solid var(--fc-border);
      border-top-color: var(--fc-sent-bg);
      border-radius: 50%;
      animation: fc-spin 0.8s linear infinite;
    }

    /* ─── Toast Notifications ────────────────────────────────────────── */
    #fc-toasts {
      position: fixed;
      top: calc(var(--safe-top) + 20px);
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .fc-toast {
      padding: 14px 18px;
      background: var(--fc-surface);
      border: 1px solid var(--fc-border);
      border-radius: 12px;
      box-shadow: var(--fc-shadow-lg);
      font-size: 0.875rem;
      color: var(--fc-text);
      opacity: 0;
      transform: translateX(100px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: all;
      max-width: 320px;
    }
    .fc-toast.show {
      opacity: 1;
      transform: translateX(0);
    }
    .fc-toast.error {
      border-color: #dc2626;
      background: #fef2f2;
      color: #991b1b;
    }
    .fc-toast.success {
      border-color: #059669;
      background: #ecfdf5;
      color: #065f46;
    }
  </style>
</head>
<body>

  <!-- Boot Splash -->
  <div id="fc-boot">
    <div class="fc-boot-icon">💬</div>
    <div class="fc-boot-spinner"></div>
    <div class="fc-boot-status" id="fc-boot-status">Connecting…</div>
  </div>

  <!-- App -->
  <div id="fc-app" hidden>
    
    <!-- Unity Header (mounted by JS) -->
    <header id="fc-topbar" class="unity-header" role="banner"></header>

    <!-- Main Container -->
    <div class="fc-container">
      
      <!-- Conversation List -->
      <div class="fc-list-pane">
        <div class="fc-list-header">
          <h1 class="fc-list-title">Messages</h1>
          <input type="text" class="fc-list-search" placeholder="Search conversations..." id="fc-search">
        </div>
        <div class="fc-list-scroll" id="fc-list">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Message Thread -->
      <div class="fc-thread-pane" id="fc-thread">
        <div class="fc-thread-header">
          <button class="fc-back-btn" id="fc-back">←</button>
          <div class="fc-thread-icon" id="fc-thread-icon">👥</div>
          <div class="fc-thread-info">
            <div class="fc-thread-name" id="fc-thread-name">Select a conversation</div>
            <div class="fc-thread-meta" id="fc-thread-meta"></div>
          </div>
        </div>
        <div class="fc-messages" id="fc-messages">
          <!-- Messages populated by JS -->
        </div>
        <div class="fc-composer">
          <div class="fc-input-wrap">
            <textarea class="fc-input" id="fc-input" placeholder="iMessage" rows="1"></textarea>
          </div>
          <button class="fc-send-btn" id="fc-send" disabled>↑</button>
        </div>
      </div>

    </div>

    <!-- Unity Footer -->
    <footer id="fc-footer" class="unity-footer"></footer>

  </div>

  <!-- Toast Container -->
  <div id="fc-toasts" aria-live="polite"></div>

  <!-- Firebase Config -->
  <script>
    window.FLOCK_FIREBASE_CONFIG = {
      apiKey:            'AIzaSyBA-fkxjABbwIHn0i6MPiXbGwahfJmuJeo',
      authDomain:        'flockos-notify.firebaseapp.com',
      projectId:         'flockos-notify',
      storageBucket:     'flockos-notify.firebasestorage.app',
      messagingSenderId: '321766738616',
      appId:             '1:321766738616:web:d2c1c53ad7493fcde4c24d',
      measurementId:     'G-EFMSZE581W'
    };
  </script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging-compat.js"></script>

  <!-- Core scripts -->
  <script defer src="Scripts/firm_foundation.js"></script>
  <script defer src="Scripts/the_upper_room.js"></script>
  <script defer src="Scripts/the_true_vine.js"></script>

  <!-- Unity header -->
  <script type="module">
    import { mountUnityHeader } from './Scripts/the_unity_header.js';
    import { mountUnityFooter } from './Scripts/the_unity_footer.js';
    
    window.addEventListener('load', () => {
      mountUnityHeader(document.getElementById('fc-topbar'), {
        appId: 'flockchat',
        appName: 'FlockChat',
        appAccent: '#007aff',
        appAccentDk: '#0051d5'
      });
      
      mountUnityFooter(document.getElementById('fc-footer'), {
        appId: 'flockchat',
        appAccent: '#007aff',
        appAccentDk: '#0051d5',
        prayerUrl: '{{CHURCH_PRAYER_URL}}',
        phone: '{{CHURCH_PHONE}}',
        mapsUrl: '{{CHURCH_MAPS_URL}}'
      });
    });
  </script>

  <!-- FlockChat v3 logic -->
  <script defer src="app.flockchat/flockchat_v3.js"></script>

</body>
</html>
