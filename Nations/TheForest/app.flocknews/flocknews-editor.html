<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <base href="../">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>FlockNews Editor</title>
  <link rel="icon" type="image/svg+xml" href="Images/icon-flocknews.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,400;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Flash prevention -->
  <script>
    (function () {
      try { document.documentElement.setAttribute('data-theme', localStorage.getItem('flock_theme') || 'america'); } catch (_) {}
    })();
  </script>

  <link rel="stylesheet" href="Styles/new_covenant.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      height: 100dvh; margin: 0; padding: 0; overflow: hidden;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #f5f0e4;
    }

    /* ── Auth Gate ── */
    #fn-auth-gate {
      position: fixed; inset: 0;
      background: #0f1735;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      flex-direction: column;
      gap: 20px;
    }
    #fn-auth-gate h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 36px; color: #e8a838; text-align: center; margin: 0;
    }
    #fn-auth-gate p { color: rgba(255,255,255,0.65); text-align: center; margin: 0; font-size: 15px; }
    .fn-auth-spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(232,168,56,0.2);
      border-top-color: #e8a838;
      border-radius: 50%;
      animation: fn-spin 0.7s linear infinite;
    }
    @keyframes fn-spin { to { transform: rotate(360deg); } }
    #fn-auth-error {
      color: #ef4444; font-size: 14px; font-weight: 600; display: none;
      text-align: center; max-width: 320px;
    }

    /* ── Editor Shell ── */
    #fn-editor-shell {
      display: none;
      height: 100dvh;
      grid-template-columns: 300px 1fr;
      grid-template-rows: 1fr;
    }
    #fn-editor-shell.ready { display: grid; }

    /* ── LEFT SIDEBAR ── */
    #fn-sidebar {
      background: #0f1735;
      display: flex; flex-direction: column;
      overflow: hidden;
      border-right: 1px solid rgba(232,168,56,0.2);
    }
    .fn-sidebar-head {
      padding: 24px 20px 16px;
      border-bottom: 1px solid rgba(232,168,56,0.2);
      flex-shrink: 0;
    }
    .fn-sidebar-head h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 20px; color: #e8a838; margin: 0 0 4px; font-weight: 700;
    }
    .fn-sidebar-head .fn-church { font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 1px; text-transform: uppercase; }

    /* Date picker */
    .fn-date-row {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(232,168,56,0.15);
      flex-shrink: 0;
    }
    .fn-date-row label {
      display: block; font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 6px;
    }
    .fn-date-row input[type="date"] {
      width: 100%; padding: 8px 12px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(232,168,56,0.25);
      border-radius: 6px; color: #fff; font-size: 14px; font-family: inherit;
      cursor: pointer;
    }
    .fn-date-row input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.5); }
    .fn-date-row input[type="date"]:focus { outline: none; border-color: #e8a838; }

    /* Section list */
    .fn-section-list {
      flex: 1; overflow-y: auto; padding: 8px;
      scrollbar-width: thin; scrollbar-color: rgba(232,168,56,0.25) transparent;
    }
    .fn-sec-btn {
      display: flex; align-items: center; gap: 12px;
      width: 100%; padding: 11px 14px; border: none; border-radius: 8px;
      background: transparent; color: rgba(255,255,255,0.7);
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; text-align: left; transition: all 0.15s;
      margin-bottom: 2px;
    }
    .fn-sec-btn .fn-sec-icon { font-size: 16px; flex-shrink: 0; }
    .fn-sec-btn:hover { background: rgba(255,255,255,0.07); color: #fff; }
    .fn-sec-btn.active { background: rgba(232,168,56,0.18); color: #e8a838; }
    .fn-sec-btn .fn-sec-saved {
      margin-left: auto; font-size: 10px; color: #22c55e; font-weight: 700;
      display: none;
    }
    .fn-sec-btn.saved .fn-sec-saved { display: block; }

    /* Sidebar footer: preview + back */
    .fn-sidebar-foot {
      padding: 14px 16px;
      border-top: 1px solid rgba(232,168,56,0.2);
      display: flex; flex-direction: column; gap: 8px;
      flex-shrink: 0;
    }
    .fn-preview-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px; border-radius: 8px;
      background: rgba(232,168,56,0.14); border: 1px solid rgba(232,168,56,0.35);
      color: #e8a838; font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; text-decoration: none; letter-spacing: 0.3px;
      transition: all 0.15s;
    }
    .fn-preview-btn:hover { background: rgba(232,168,56,0.22); }
    .fn-back-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 9px; border-radius: 8px;
      background: transparent; border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5); font-family: inherit; font-size: 12px;
      font-weight: 600; cursor: pointer; text-decoration: none; letter-spacing: 0.3px;
      transition: all 0.15s;
    }
    .fn-back-btn:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); }

    /* ── MAIN EDITOR AREA ── */
    #fn-main {
      display: flex; flex-direction: column; overflow: hidden;
      background: #f5f0e4;
    }

    /* Top bar */
    .fn-main-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px;
      height: 56px;
      background: #fff;
      border-bottom: 1px solid rgba(15,23,53,0.12);
      flex-shrink: 0;
    }
    .fn-section-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 18px; font-weight: 700; color: #0f1735;
    }
    .fn-topbar-actions { display: flex; gap: 10px; align-items: center; }
    .fn-save-btn {
      padding: 8px 22px;
      background: #0f1735; color: #e8a838;
      border: none; border-radius: 8px;
      font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; letter-spacing: 0.3px;
    }
    .fn-save-btn:hover { background: #1b264f; }
    .fn-save-btn:disabled { opacity: 0.5; cursor: default; }
    .fn-save-status {
      font-size: 12px; color: #22c55e; font-weight: 700; opacity: 0;
      transition: opacity 0.3s;
    }
    .fn-save-status.visible { opacity: 1; }
    .fn-save-status.error { color: #ef4444; }

    /* Toolbar */
    .fn-toolbar {
      display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
      padding: 8px 32px;
      background: #faf7f0;
      border-bottom: 1px solid rgba(15,23,53,0.1);
      flex-shrink: 0;
    }
    .fn-toolbar-btn {
      padding: 5px 10px; border-radius: 5px;
      background: transparent; border: 1px solid rgba(15,23,53,0.15);
      font-family: inherit; font-size: 13px; color: #0f1735;
      cursor: pointer; transition: all 0.12s; font-weight: 600;
      line-height: 1.3;
    }
    .fn-toolbar-btn:hover { background: rgba(15,23,53,0.08); }
    .fn-toolbar-sep {
      width: 1px; height: 22px; background: rgba(15,23,53,0.18);
      margin: 0 4px; flex-shrink: 0;
    }
    .fn-toolbar-select {
      padding: 5px 8px; border-radius: 5px;
      background: transparent; border: 1px solid rgba(15,23,53,0.15);
      font-family: inherit; font-size: 12px; color: #0f1735;
      cursor: pointer;
    }

    /* Scroll container */
    #fn-editor-scroll {
      flex: 1; overflow-y: auto; padding: 32px 40px 60px;
    }

    /* Form fields */
    .fn-field { margin-bottom: 22px; }
    .fn-field label {
      display: block; font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: #c48a20; margin-bottom: 8px;
    }
    .fn-field input[type="text"],
    .fn-field input[type="number"],
    .fn-field textarea {
      width: 100%; padding: 10px 14px;
      background: #fff; border: 1px solid rgba(15,23,53,0.18);
      border-radius: 6px; font-family: 'Noto Serif', Georgia, serif;
      font-size: 15px; color: #0f1735; transition: border-color 0.15s;
    }
    .fn-field input[type="text"]:focus,
    .fn-field input[type="number"]:focus,
    .fn-field textarea:focus { outline: none; border-color: #c48a20; }
    .fn-field textarea { min-height: 120px; resize: vertical; line-height: 1.7; }
    .fn-field-hint {
      font-size: 11px; color: rgba(15,23,53,0.45); margin-top: 5px;
      font-style: italic;
    }

    /* Rich content area */
    .fn-rich-area {
      min-height: 280px; padding: 16px 20px;
      background: #fff; border: 1px solid rgba(15,23,53,0.18);
      border-radius: 6px; font-family: 'Noto Serif', Georgia, serif;
      font-size: 15px; color: #0f1735; line-height: 1.8;
      outline: none; overflow-y: auto;
    }
    .fn-rich-area:focus { border-color: #c48a20; }
    .fn-rich-area h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 26px; font-weight: 800; color: #0f1735;
      margin: 0 0 14px; border-bottom: 1px solid rgba(196,138,32,0.3); padding-bottom: 8px;
    }
    .fn-rich-area h3 {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: #c48a20;
      margin: 18px 0 8px;
    }
    .fn-rich-area p { margin: 0 0 14px; }
    .fn-rich-area ul, .fn-rich-area ol { padding-left: 24px; margin: 0 0 14px; }
    .fn-rich-area li { margin-bottom: 6px; line-height: 1.7; }
    .fn-rich-area blockquote {
      margin: 18px 0; padding: 12px 18px;
      border-left: 4px solid #e8a838;
      background: rgba(232,168,56,0.08); border-radius: 0 4px 4px 0;
      font-style: italic; color: #0f1735;
    }

    /* Two-column form (for words section) */
    .fn-col2 {
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
    }
    @media (max-width: 900px) { .fn-col2 { grid-template-columns: 1fr; } }

    .fn-divider {
      border: none;
      border-top: 2px double rgba(196,138,32,0.4);
      margin: 28px 0;
    }
    .fn-subsection-label {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 20px; font-weight: 700; color: #0f1735;
      margin: 0 0 16px; padding-bottom: 8px;
      border-bottom: 1px solid rgba(196,138,32,0.3);
    }

    /* Empty state */
    .fn-empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 16px;
      color: rgba(15,23,53,0.4); text-align: center;
    }
    .fn-empty-state h3 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 24px; color: #0f1735; margin: 0;
    }
    .fn-empty-state p { font-size: 14px; margin: 0; max-width: 280px; }

    /* Mobile: sidebar collapses to bottom drawer */
    @media (max-width: 768px) {
      #fn-editor-shell.ready {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr auto;
      }
      #fn-sidebar {
        order: 2;
        border-right: none;
        border-top: 1px solid rgba(232,168,56,0.2);
        max-height: 200px;
      }
      .fn-sidebar-head { display: none; }
      .fn-section-list { padding: 6px; }
      .fn-section-list .fn-sec-btn { padding: 8px 12px; font-size: 12px; }
      #fn-editor-scroll { padding: 20px; }
      .fn-toolbar { padding: 6px 16px; }
      .fn-main-topbar { padding: 0 16px; }
      .fn-date-row { padding: 10px 14px; }
      .fn-sidebar-foot { flex-direction: row; padding: 10px 12px; }
    }
  </style>
</head>
<body>

  <!-- Auth Gate — shown until pastor+ auth confirmed -->
  <div id="fn-auth-gate">
    <div class="fn-auth-spinner"></div>
    <h1>FlockNews Editor</h1>
    <p>Verifying pastor credentials&hellip;</p>
    <div id="fn-auth-error"></div>
  </div>

  <!-- Editor Shell — shown after auth -->
  <div id="fn-editor-shell">

    <!-- Left Sidebar -->
    <div id="fn-sidebar">
      <div class="fn-sidebar-head">
        <h2>FlockNews Editor</h2>
        <div class="fn-church" id="fn-church-label">Loading church&hellip;</div>
      </div>

      <div class="fn-date-row">
        <label>Edition Date</label>
        <input type="date" id="fn-edition-date">
      </div>

      <nav class="fn-section-list" id="fn-section-list">
        <!-- Section buttons injected by JS -->
      </nav>

      <div class="fn-sidebar-foot">
        <a class="fn-preview-btn" id="fn-preview-link" href="app.flocknews/app.flocknews.html" target="_blank" rel="noopener noreferrer">
          👁 View Live Edition
        </a>
        <a class="fn-back-btn" href="app.flocknews/app.flocknews.html">← Back to FlockNews</a>
      </div>
    </div>

    <!-- Main Editor Area -->
    <div id="fn-main">
      <!-- Top bar -->
      <div class="fn-main-topbar">
        <div class="fn-section-title" id="fn-active-section-title">Select a section to edit</div>
        <div class="fn-topbar-actions">
          <span class="fn-save-status" id="fn-save-status"></span>
          <button class="fn-save-btn" id="fn-save-btn" onclick="fnSave()" disabled>Save</button>
        </div>
      </div>

      <!-- Toolbar (hidden until section selected) -->
      <div class="fn-toolbar" id="fn-toolbar" style="display:none;">
        <button class="fn-toolbar-btn" title="Bold" onmousedown="fnExec(event,'bold')"><strong>B</strong></button>
        <button class="fn-toolbar-btn" title="Italic" onmousedown="fnExec(event,'italic')"><em>I</em></button>
        <button class="fn-toolbar-btn" title="Underline" onmousedown="fnExec(event,'underline')" style="text-decoration:underline">U</button>
        <div class="fn-toolbar-sep"></div>
        <button class="fn-toolbar-btn" title="Heading" onmousedown="fnExec(event,'formatBlock','h2')">H2</button>
        <button class="fn-toolbar-btn" title="Subhead" onmousedown="fnExec(event,'formatBlock','h3')">H3</button>
        <button class="fn-toolbar-btn" title="Paragraph" onmousedown="fnExec(event,'formatBlock','p')">¶</button>
        <div class="fn-toolbar-sep"></div>
        <button class="fn-toolbar-btn" title="Bullet list" onmousedown="fnExec(event,'insertUnorderedList')">• List</button>
        <button class="fn-toolbar-btn" title="Numbered list" onmousedown="fnExec(event,'insertOrderedList')">1. List</button>
        <button class="fn-toolbar-btn" title="Blockquote / pull quote" onmousedown="fnExec(event,'formatBlock','blockquote')">&ldquo;&rdquo;</button>
        <div class="fn-toolbar-sep"></div>
        <button class="fn-toolbar-btn" title="Remove formatting" onmousedown="fnExec(event,'removeFormat')">✕ fmt</button>
      </div>

      <!-- Scroll area for form -->
      <div id="fn-editor-scroll">
        <div class="fn-empty-state" id="fn-empty-state">
          <span style="font-size:48px">📰</span>
          <h3>FlockNews Editor</h3>
          <p>Select a section from the sidebar to begin editing today&rsquo;s edition.</p>
        </div>
        <div id="fn-form-area" style="display:none;"></div>
      </div>
    </div>

  </div>

  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

  <!-- FlockOS Core (Nehemiah for auth) -->
  <script defer src="Scripts/firm_foundation.js"></script>
  <script defer src="Scripts/the_upper_room.js"></script>
  <script defer src="Scripts/the_true_vine.js"></script>

  <script>
  // ═══════════════════════════════════════════════════════════
  // FlockNews Editor — Standalone pastor CMS
  // ═══════════════════════════════════════════════════════════

  const FNE = {
    db: null,
    dateKey: '',
    activeSection: null,
    savedSections: new Set(),
  };

  const SECTIONS = [
    { id: 'introduction',  label: 'Welcome',               icon: '✨', rich: true  },
    { id: 'pastorHeart',   label: "Pastor's Heart",        icon: '❤️', rich: true  },
    { id: 'announcements', label: 'Announcements',         icon: '📢', rich: true  },
    { id: 'mission',       label: 'Mission of the Day',    icon: '🌍', rich: true  },
    { id: 'reading',       label: 'Bible Reading',         icon: '📖', rich: true  },
    { id: 'devotional',    label: 'Daily Devotional',      icon: '✨', rich: true  },
    { id: 'words',         label: 'Word of the Day',       icon: '📚', rich: false },
    { id: 'book',          label: 'Bible Book of the Day', icon: '📕', rich: false },
  ];

  // ── Toolbar: onmousedown so focus stays in editor ──────────
  function fnExec(evt, cmd, arg) {
    evt.preventDefault();
    const area = document.querySelector('.fn-rich-area[contenteditable]');
    if (!area) return;
    area.focus();
    document.execCommand(cmd, false, arg || null);
  }

  // ── Init ───────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    // Set today's date as default
    const today = new Date().toISOString().split('T')[0];
    const dateInput = document.getElementById('fn-edition-date');
    dateInput.value = today;
    FNE.dateKey = today;

    dateInput.addEventListener('change', () => {
      FNE.dateKey = dateInput.value;
      FNE.savedSections.clear();
      document.querySelectorAll('.fn-sec-btn').forEach(b => b.classList.remove('saved'));
      // Reload current section with new date data
      if (FNE.activeSection) loadSection(FNE.activeSection);
    });

    // Build section list
    const list = document.getElementById('fn-section-list');
    SECTIONS.forEach(sec => {
      const btn = document.createElement('button');
      btn.className = 'fn-sec-btn';
      btn.setAttribute('data-sec', sec.id);
      btn.innerHTML = `<span class="fn-sec-icon">${sec.icon}</span>${sec.label}<span class="fn-sec-saved">✓ Saved</span>`;
      btn.addEventListener('click', () => selectSection(sec.id));
      list.appendChild(btn);
    });

    // Wait for Firebase + auth
    waitForFirebase();
  });

  function waitForFirebase() {
    let attempts = 0;
    const poll = () => {
      attempts++;
      if (typeof firebase !== 'undefined' && window.FLOCK_FIREBASE_CONFIG) {
        try {
          if (!firebase.apps.length) {
            firebase.initializeApp(window.FLOCK_FIREBASE_CONFIG);
          }
          FNE.db = firebase.firestore();
          console.log('[FNEditor] Firebase ready');
        } catch (e) {
          console.warn('[FNEditor] Firebase init error:', e);
        }
        waitForAuth();
        return;
      }
      if (attempts < 100) setTimeout(poll, 100);
      else showAuthError('Firebase failed to load. Please refresh.');
    };
    setTimeout(poll, 200);
  }

  function waitForAuth() {
    let attempts = 0;
    const poll = async () => {
      attempts++;
      if (typeof Nehemiah !== 'undefined') {
        // Authenticate Nehemiah → UpperRoom
        try {
          if (typeof UpperRoom !== 'undefined') {
            await UpperRoom.init(window.FLOCK_FIREBASE_CONFIG || null);
            await UpperRoom.authenticate();
          }
        } catch (e) {
          console.warn('[FNEditor] UpperRoom auth error:', e);
        }

        if (Nehemiah.isAuthenticated()) {
          const profile = Nehemiah.getProfile();
          if (profile && (profile.role === 'pastor' || profile.role === 'admin')) {
            grantAccess(profile);
            return;
          } else {
            showAuthError('Access denied. Pastor or Admin role required to edit FlockNews.');
            return;
          }
        } else {
          // Not signed in — redirect to login
          showAuthError('You must be signed in as a Pastor or Admin. Redirecting to login...');
          setTimeout(() => {
            window.location.href = 'app.flocknews/app.flocknews.html';
          }, 2500);
          return;
        }
      }
      if (attempts < 80) setTimeout(poll, 100);
      else showAuthError('Authentication timed out. Please refresh and sign in first.');
    };
    setTimeout(poll, 300);
  }

  function grantAccess(profile) {
    document.getElementById('fn-auth-gate').style.display = 'none';
    document.getElementById('fn-editor-shell').classList.add('ready');

    // Load church name
    if (FNE.db) {
      FNE.db.collection('appConfig').doc('church_name').get()
        .then(doc => {
          if (doc.exists) {
            const name = (doc.data().value || '').trim();
            if (name) document.getElementById('fn-church-label').textContent = name;
          }
        }).catch(() => {});
    }
  }

  function showAuthError(msg) {
    const spinner = document.querySelector('.fn-auth-spinner');
    const err = document.getElementById('fn-auth-error');
    if (spinner) spinner.style.display = 'none';
    err.textContent = msg;
    err.style.display = 'block';
  }

  // ── Section selection ──────────────────────────────────────
  function selectSection(id) {
    FNE.activeSection = id;
    document.querySelectorAll('.fn-sec-btn').forEach(b => {
      b.classList.toggle('active', b.getAttribute('data-sec') === id);
    });
    const sec = SECTIONS.find(s => s.id === id);
    document.getElementById('fn-active-section-title').textContent = sec ? sec.label : id;
    document.getElementById('fn-save-btn').disabled = false;
    document.getElementById('fn-empty-state').style.display = 'none';
    document.getElementById('fn-form-area').style.display = 'block';
    document.getElementById('fn-toolbar').style.display = sec && sec.rich ? 'flex' : 'none';
    loadSection(id);
  }

  // ── Load section data ──────────────────────────────────────
  async function loadSection(id) {
    const area = document.getElementById('fn-form-area');
    area.innerHTML = '<div style="padding:40px;text-align:center;color:rgba(15,23,53,0.4)"><div class="fn-auth-spinner" style="margin:0 auto;border-color:rgba(196,138,32,0.2);border-top-color:#c48a20;width:30px;height:30px;border-width:2px;"></div></div>';

    let stored = {};

    try {
      if (FNE.db) {
        // Determine which collection to load from
        if (id === 'reading') {
          const doc = await FNE.db.collection('reading').doc(FNE.dateKey).get();
          if (doc.exists) stored = doc.data() || {};
        } else if (id === 'devotional') {
          const doc = await FNE.db.collection('devotionals').doc(FNE.dateKey).get();
          if (doc.exists) stored = doc.data() || {};
        } else {
          const doc = await FNE.db.collection('flockNews').doc(FNE.dateKey).get();
          if (doc.exists) {
            const data = doc.data() || {};
            stored = data[id] || {};
            // words section: greekWord + hebrewWord are top-level keys
            if (id === 'words') {
              stored = { greek: data.greekWord || {}, hebrew: data.hebrewWord || {} };
            }
          }
        }
      }
    } catch (e) {
      console.warn('[FNEditor] Load error:', e);
    }

    area.innerHTML = buildForm(id, stored);
  }

  // ── Build form HTML ────────────────────────────────────────
  function buildForm(id, data) {
    switch (id) {
      case 'introduction':
      case 'pastorHeart':
      case 'announcements':
      case 'mission': {
        const label = { introduction: 'Welcome Message', pastorHeart: "Pastor's Message",
          announcements: 'Announcements', mission: 'Mission Briefing' }[id];
        return `
          <div class="fn-field">
            <label>${label}</label>
            <div class="fn-rich-area" id="fn-rich-content" contenteditable="true">${data.content || ''}</div>
            <p class="fn-field-hint">Supports bold, italic, headings, lists, pull-quotes (blockquote). Use the toolbar above.</p>
          </div>`;
      }

      case 'reading':
        return `
          <div class="fn-field">
            <label>Passage Name</label>
            <input type="text" id="fn-f-passage" value="${_esc(data.passage || '')}" placeholder="e.g., Today's One Year Bible">
          </div>
          <div class="fn-field">
            <label>Scripture References</label>
            <input type="text" id="fn-f-reference" value="${_esc(data.reference || '')}" placeholder="e.g., OT: Genesis 1, NT: Matthew 1, Psalm 1, Proverbs 1">
          </div>
          <div class="fn-field">
            <label>Reading Content</label>
            <div class="fn-rich-area" id="fn-rich-content" contenteditable="true">${data.content || ''}</div>
            <p class="fn-field-hint">Add additional commentary or notes alongside the scripture references.</p>
          </div>`;

      case 'devotional':
        return `
          <div class="fn-field">
            <label>Devotional Title</label>
            <input type="text" id="fn-f-title" value="${_esc(data.title || '')}" placeholder="e.g., Walking in the Light">
          </div>
          <div class="fn-field">
            <label>Author</label>
            <input type="text" id="fn-f-author" value="${_esc(data.author || '')}" placeholder="e.g., Pastor Greg">
          </div>
          <div class="fn-field">
            <label>Devotional Content</label>
            <div class="fn-rich-area" id="fn-rich-content" contenteditable="true">${data.content || ''}</div>
            <p class="fn-field-hint">Write the full devotional here. Drop caps and pull quotes (blockquote) will render in the newspaper view.</p>
          </div>`;

      case 'words': {
        const g = (data.greek || {});
        const h = (data.hebrew || {});
        return `
          <div class="fn-col2">
            <div>
              <p class="fn-subsection-label">Greek Word</p>
              <div class="fn-field"><label>Greek Term</label>
                <input type="text" id="fn-f-greek-term" value="${_esc(g.term || '')}" placeholder="e.g., ἀγάπη"></div>
              <div class="fn-field"><label>Transliteration</label>
                <input type="text" id="fn-f-greek-translit" value="${_esc(g.transliteration || '')}" placeholder="e.g., agapē"></div>
              <div class="fn-field"><label>Definition</label>
                <input type="text" id="fn-f-greek-def" value="${_esc(g.definition || '')}" placeholder="Brief one-line definition"></div>
              <div class="fn-field"><label>Nuance &amp; Detail</label>
                <textarea id="fn-f-greek-nuance" placeholder="Detailed meaning, cultural context, usage">${_esc(g.nuance || '')}</textarea></div>
              <div class="fn-field"><label>Strong&rsquo;s Number</label>
                <input type="text" id="fn-f-greek-strongs" value="${_esc(g.strongs || '')}" placeholder="e.g., Strong's G26"></div>
              <div class="fn-field"><label>Example Verses</label>
                <textarea id="fn-f-greek-examples" rows="3" placeholder="e.g., John 3:16; 1 Cor 13:4-7">${_esc(g.examples || '')}</textarea></div>
            </div>
            <div>
              <p class="fn-subsection-label">Hebrew Word</p>
              <div class="fn-field"><label>Hebrew Term</label>
                <input type="text" id="fn-f-heb-term" value="${_esc(h.term || '')}" placeholder="e.g., שָׁלוֹם"></div>
              <div class="fn-field"><label>Transliteration</label>
                <input type="text" id="fn-f-heb-translit" value="${_esc(h.transliteration || '')}" placeholder="e.g., shalom"></div>
              <div class="fn-field"><label>Definition</label>
                <input type="text" id="fn-f-heb-def" value="${_esc(h.definition || '')}" placeholder="Brief one-line definition"></div>
              <div class="fn-field"><label>Nuance &amp; Detail</label>
                <textarea id="fn-f-heb-nuance" placeholder="Detailed meaning, cultural context, usage">${_esc(h.nuance || '')}</textarea></div>
              <div class="fn-field"><label>Strong&rsquo;s Number</label>
                <input type="text" id="fn-f-heb-strongs" value="${_esc(h.strongs || '')}" placeholder="e.g., Strong's H7965"></div>
              <div class="fn-field"><label>Example Verses</label>
                <textarea id="fn-f-heb-examples" rows="3" placeholder="e.g., Numbers 6:26; Isaiah 26:3">${_esc(h.examples || '')}</textarea></div>
            </div>
          </div>`;
      }

      case 'book':
        return `
          <div class="fn-col2">
            <div>
              <div class="fn-field"><label>Book Name</label>
                <input type="text" id="fn-f-book-name" value="${_esc(data.name || '')}" placeholder="e.g., Ephesians"></div>
              <div class="fn-field"><label>Testament</label>
                <input type="text" id="fn-f-book-testament" value="${_esc(data.testament || '')}" placeholder="e.g., New Testament"></div>
              <div class="fn-field"><label>Author</label>
                <input type="text" id="fn-f-book-author" value="${_esc(data.author || '')}" placeholder="e.g., Paul the Apostle"></div>
              <div class="fn-field"><label>Date Written</label>
                <input type="text" id="fn-f-book-date" value="${_esc(data.date || '')}" placeholder="e.g., ~AD 60-62"></div>
              <div class="fn-field"><label>Reading Time</label>
                <input type="text" id="fn-f-book-time" value="${_esc(data.readingTime || '')}" placeholder="e.g., ~20 minutes"></div>
            </div>
            <div>
              <div class="fn-field"><label>Chapters</label>
                <input type="number" id="fn-f-book-chapters" value="${data.chapters || 0}"></div>
              <div class="fn-field"><label>Verses</label>
                <input type="number" id="fn-f-book-verses" value="${data.verses || 0}"></div>
              <div class="fn-field"><label>Overview</label>
                <textarea id="fn-f-book-overview" rows="5" placeholder="Brief overview of the book's purpose and context">${_esc(data.overview || '')}</textarea></div>
              <div class="fn-field"><label>Key Themes <span style="font-weight:400;text-transform:none;letter-spacing:0">(one per line)</span></label>
                <textarea id="fn-f-book-themes" rows="5" placeholder="Unity in Christ&#10;Grace through faith&#10;...">${_esc((data.themes || []).join('\n'))}</textarea></div>
              <div class="fn-field"><label>Key Verses</label>
                <textarea id="fn-f-book-keyverses" rows="4" placeholder='e.g., "For by grace..." — Eph 2:8-9'>${_esc(data.keyVerses || '')}</textarea></div>
            </div>
          </div>`;

      default:
        return `<div class="fn-empty-state"><p>Unknown section: ${_esc(id)}</p></div>`;
    }
  }

  // ── Save ───────────────────────────────────────────────────
  async function fnSave() {
    if (!FNE.activeSection || !FNE.db) return;
    const btn = document.getElementById('fn-save-btn');
    const statusEl = document.getElementById('fn-save-status');
    btn.disabled = true;
    _setStatus('Saving…', false);

    try {
      const id = FNE.activeSection;
      let payload = {};
      const now = new Date().toISOString();

      switch (id) {
        case 'introduction':
        case 'pastorHeart':
        case 'announcements':
        case 'mission':
          payload[id] = {
            content: document.getElementById('fn-rich-content').innerHTML,
            lastUpdated: now,
          };
          await FNE.db.collection('flockNews').doc(FNE.dateKey).set(payload, { merge: true });
          break;

        case 'reading':
          payload = {
            passage:   (document.getElementById('fn-f-passage')?.value || '').trim(),
            reference: (document.getElementById('fn-f-reference')?.value || '').trim(),
            content:   document.getElementById('fn-rich-content').innerHTML,
            lastUpdated: now,
          };
          await FNE.db.collection('reading').doc(FNE.dateKey).set(payload, { merge: true });
          break;

        case 'devotional':
          payload = {
            title:   (document.getElementById('fn-f-title')?.value || '').trim(),
            author:  (document.getElementById('fn-f-author')?.value || '').trim(),
            content: document.getElementById('fn-rich-content').innerHTML,
            lastUpdated: now,
          };
          await FNE.db.collection('devotionals').doc(FNE.dateKey).set(payload, { merge: true });
          break;

        case 'words':
          payload = {
            greekWord: {
              term:           (document.getElementById('fn-f-greek-term')?.value || '').trim(),
              transliteration:(document.getElementById('fn-f-greek-translit')?.value || '').trim(),
              definition:     (document.getElementById('fn-f-greek-def')?.value || '').trim(),
              nuance:         (document.getElementById('fn-f-greek-nuance')?.value || '').trim(),
              strongs:        (document.getElementById('fn-f-greek-strongs')?.value || '').trim(),
              examples:       (document.getElementById('fn-f-greek-examples')?.value || '').trim(),
              lastUpdated: now,
            },
            hebrewWord: {
              term:           (document.getElementById('fn-f-heb-term')?.value || '').trim(),
              transliteration:(document.getElementById('fn-f-heb-translit')?.value || '').trim(),
              definition:     (document.getElementById('fn-f-heb-def')?.value || '').trim(),
              nuance:         (document.getElementById('fn-f-heb-nuance')?.value || '').trim(),
              strongs:        (document.getElementById('fn-f-heb-strongs')?.value || '').trim(),
              examples:       (document.getElementById('fn-f-heb-examples')?.value || '').trim(),
              lastUpdated: now,
            },
          };
          await FNE.db.collection('flockNews').doc(FNE.dateKey).set(payload, { merge: true });
          break;

        case 'book': {
          const themes = (document.getElementById('fn-f-book-themes')?.value || '')
            .split('\n').map(t => t.trim()).filter(Boolean);
          payload = {
            book: {
              name:        (document.getElementById('fn-f-book-name')?.value || '').trim(),
              testament:   (document.getElementById('fn-f-book-testament')?.value || '').trim(),
              author:      (document.getElementById('fn-f-book-author')?.value || '').trim(),
              date:        (document.getElementById('fn-f-book-date')?.value || '').trim(),
              readingTime: (document.getElementById('fn-f-book-time')?.value || '').trim(),
              chapters:    parseInt(document.getElementById('fn-f-book-chapters')?.value || '0', 10),
              verses:      parseInt(document.getElementById('fn-f-book-verses')?.value || '0', 10),
              overview:    (document.getElementById('fn-f-book-overview')?.value || '').trim(),
              themes,
              keyVerses:   (document.getElementById('fn-f-book-keyverses')?.value || '').trim(),
              lastUpdated: now,
            },
          };
          await FNE.db.collection('flockNews').doc(FNE.dateKey).set(payload, { merge: true });
          break;
        }
      }

      // Mark section as saved
      FNE.savedSections.add(id);
      const secBtn = document.querySelector(`.fn-sec-btn[data-sec="${id}"]`);
      if (secBtn) secBtn.classList.add('saved');
      _setStatus('✓ Saved', false);
      setTimeout(() => { statusEl.classList.remove('visible'); }, 3000);

    } catch (err) {
      console.error('[FNEditor] Save error:', err);
      _setStatus('Save failed — check Firestore connection', true);
    }

    btn.disabled = false;
  }

  function _setStatus(msg, isError) {
    const el = document.getElementById('fn-save-status');
    el.textContent = msg;
    el.className = 'fn-save-status visible' + (isError ? ' error' : '');
  }

  // ── Escape HTML ────────────────────────────────────────────
  function _esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ── Keyboard shortcut: Cmd/Ctrl+S to save ─────────────────
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 's') {
      e.preventDefault();
      if (!document.getElementById('fn-save-btn').disabled) fnSave();
    }
  });
