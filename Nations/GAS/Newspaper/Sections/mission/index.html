<!DOCTYPE html>
<html lang="en" data-theme="broadsheet">
<head>
  <script>
    window.FLOCK_FIREBASE_CONFIG = null;
    window.HERALD_CHURCH_NAME = "FlockOS-GAS";
    window.HERALD_CHURCH_ID   = "gas";
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="theme-color" content="#faf6ed">
  <title>The Mission — The Flock Herald</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="../../Styles/the_broadsheet.css">
  <link rel="stylesheet" href="../../Styles/sections/mission.css">
  <script>
    (function () {
      try {
        var s = parseFloat(localStorage.getItem('flock_font_scale') || '1');
        if (s >= 0.85 && s <= 1.25) document.documentElement.style.setProperty('--fn-scale', s);
        var t = localStorage.getItem('flock_theme') || 'broadsheet';
        document.documentElement.setAttribute('data-theme', t);
      } catch (_) {}
    })();
  </script>
</head>
<body>
  <nav class="sec-nav-bar" id="sec-nav" aria-label="Paper sections"></nav>

  <main class="np-page" id="section-main">

    <div class="np-section-banner">
      <p class="np-section-banner__flag">The Flock Herald &mdash; Outreach &amp; Evangelism</p>
      <h1 class="np-section-banner__title">The Mission</h1>
      <p class="np-section-banner__deck">Global missions registry &middot; Outreach campaigns &middot; Harvest tracking</p>
      <span class="np-section-banner__accent" style="background:var(--sec-mission,#0e2818)"></span>
    </div>

    <div class="np-panels">

      <details class="np-panel" id="accordion-mission" open>
        <summary class="np-panel__hdr">
          <span class="np-panel__icon">&#127758;</span>
          <span class="np-panel__title">Missions Registry</span>
          <span class="np-panel__meta">Global missions &amp; outreach contacts</span>
          <span class="np-panel__caret">&#9656;</span>
        </summary>
        <div class="np-panel__body" id="panel-mission"></div>
      </details>

      <details class="np-panel" id="accordion-harvest">
        <summary class="np-panel__hdr">
          <span class="np-panel__icon">&#127807;</span>
          <span class="np-panel__title">Harvest Report</span>
          <span class="np-panel__meta">Outreach conversations &amp; follow-up</span>
          <span class="np-panel__caret">&#9656;</span>
        </summary>
        <div class="np-panel__body" id="panel-harvest"></div>
      </details>

    </div><!-- .np-panels -->
  </main>

  <script src="../../Scripts/the_true_vine.js"></script>
  <script src="../../Scripts/firm_foundation.js"></script>
  <script>
    (function () {
      if (typeof Nehemiah !== 'undefined') {
        var sess = Nehemiah.guard();
        if (sess && !Nehemiah.hasRole('admin')) { window.location.replace('../../index.html'); }
      }
    })();
  </script>
  <script src="../../Scripts/the_adornment.js"></script>
  <script src="../../Scripts/the_gates.js?v=2"></script>
  <script src="../../Data/missions.js"></script>
  <script src="../../Data/prayercast.js"></script>
  <script src="../../Scripts/the_mission.js?v=2"></script>
  <script src="../../Scripts/the_harvest_report.js?v=2"></script>
</body>
</html>
