<!DOCTYPE html>
<html lang="en" class="sec-the-way">
<head>
  <script>
    window.FLOCK_FIREBASE_CONFIG = null;
    window.HERALD_CHURCH_NAME = "FlockOS-GAS";
    window.HERALD_CHURCH_ID   = "gas";
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>The Way — The Flock Herald</title>
  <script>
    (function() {
      var s = localStorage.getItem('flock_font_scale');
      if (s) document.documentElement.style.setProperty('--fn-scale', s);
    })();
  </script>
  <link rel="stylesheet" href="../../Styles/the_broadsheet.css">
  <link rel="stylesheet" href="../../Styles/sections/the_way.css">
  <link rel="manifest" href="../../manifest.json">
</head>
<body class="broadsheet-page sec-the-way">

  <header class="sec-masthead" role="banner">
    <!-- Aa button: absolute top-right, safe area aware -->
    <button class="sec-masthead__font-btn way-aa-btn" id="font-scale-btn" aria-label="Adjust text size" type="button">Aa</button>

    <!-- Shared compact folio header -->
    <div class="sec-compact-folio">
      <div class="sec-compact__left">
        <h2 class="sec-compact__title">The Flock Herald</h2>
      </div>
      <div class="sec-compact__right">
        <button class="sec-date-btn" id="sec-compact-date" aria-haspopup="true" aria-expanded="false" type="button">
          <span class="sec-date-btn__text" id="sec-compact-date-text"></span>
          <span class="sec-date-btn__caret" aria-hidden="true">&#9663;</span>
        </button>
        <div class="sec-date-picker" id="sec-date-picker" aria-hidden="true">
          <input type="date" id="sec-date-input" />
        </div>
        <p class="sec-compact__edition" id="sec-compact-edition"></p>
      </div>
    </div>
  </header>

  <!-- Section Nav Bar — scrolls with page content -->
  <nav class="sec-nav-bar" role="navigation" aria-label="Herald sections" id="sec-nav"></nav>

  <div class="broadsheet-columns way-broadsheet" id="the-way-grid">
    <div class="broadsheet-col broadsheet-col--main" id="way-main">
      <!-- Lead story + module stories injected by the_way.js -->
      <div class="way-loading">Loading today&rsquo;s edition&hellip;</div>
    </div>
    <div class="broadsheet-col broadsheet-col--aside" id="way-aside">
      <!-- Today strip: psalm, OYB, quick links -->
    </div>
  </div>

  <aside class="right-drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title">
    <header class="drawer-header">
      <h2 id="drawer-title" class="drawer-title"></h2>
      <button class="drawer-close" type="button" aria-label="Close">&#x2715;</button>
    </header>
    <div class="drawer-body" id="drawer-body"></div>
  </aside>
  <div class="drawer-backdrop" aria-hidden="true"></div>
  <div class="toast-layer" id="toast-layer" aria-live="polite" aria-atomic="true"></div>

  <script>
    (function() {
      var masthead = document.querySelector('.sec-masthead');
      var secNav   = document.getElementById('sec-nav');
      if (!masthead) return;

      function updatePadding() {
        var mh = masthead.offsetHeight;
        if (secNav) {
          secNav.style.top = mh + 'px';
          document.body.style.paddingTop = (mh + secNav.offsetHeight) + 'px';
        } else {
          document.body.style.paddingTop = mh + 'px';
        }
      }
      if (document.fonts) {
        document.fonts.ready.then(updatePadding);
      } else {
        setTimeout(updatePadding, 300);
      }
      window.addEventListener('resize', updatePadding);
      updatePadding();

      var MONTHS = ['Jan.','Feb.','Mar.','Apr.','May.','Jun.','Jul.','Aug.','Sep.','Oct.','Nov.','Dec.'];
      function dayOfYear(dt) {
        var start = new Date(dt.getFullYear(), 0, 0);
        return Math.floor((dt - start) / 86400000);
      }
      function pad2(n) { return n < 10 ? '0' + n : '' + n; }
      function formatDisplay(dt) {
        return MONTHS[dt.getMonth()] + ' ' + pad2(dt.getDate()) + ', ' + dt.getFullYear();
      }
      function toInputVal(dt) {
        return dt.getFullYear() + '-' + pad2(dt.getMonth()+1) + '-' + pad2(dt.getDate());
      }
      function applyDate(dt) {
        var txt = document.getElementById('sec-compact-date-text');
        var ed  = document.getElementById('sec-compact-edition');
        var inp = document.getElementById('sec-date-input');
        if (txt) txt.textContent = formatDisplay(dt);
        if (ed)  ed.textContent  = 'VOLUME: ' + dt.getFullYear() + '  •  EDITION: ' + pad2(dayOfYear(dt));
        if (inp) inp.value = toInputVal(dt);
        window._heraldDate = dt;
      }

      var _pickerOpen = false;
      var dateBtn    = document.getElementById('sec-compact-date');
      var datePicker = document.getElementById('sec-date-picker');
      var dateInput  = document.getElementById('sec-date-input');

      function openPicker() {
        _pickerOpen = true;
        datePicker.removeAttribute('aria-hidden');
        datePicker.classList.add('is-open');
        dateBtn.setAttribute('aria-expanded', 'true');
        dateInput.focus();
      }
      function closePicker() {
        _pickerOpen = false;
        datePicker.setAttribute('aria-hidden', 'true');
        datePicker.classList.remove('is-open');
        dateBtn.setAttribute('aria-expanded', 'false');
      }
      if (dateBtn) {
        dateBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          _pickerOpen ? closePicker() : openPicker();
        });
      }
      if (dateInput) {
        dateInput.addEventListener('change', function() {
          var parts = dateInput.value.split('-');
          var dt = new Date(+parts[0], +parts[1]-1, +parts[2]);
          applyDate(dt);
          closePicker();
          updatePadding();
        });
      }
      document.addEventListener('click', function(e) {
        if (_pickerOpen && datePicker && !datePicker.contains(e.target) && e.target !== dateBtn) {
          closePicker();
        }
      });

      applyDate(new Date());
    })();
  </script>
  <script src="../../Scripts/the_true_vine.js"></script>
  <script src="../../Scripts/firm_foundation.js"></script>
  <script>window._HERALD_AUTH_LEVEL = -1;</script>
  <script src="../../Scripts/the_adornment.js"></script>
  <script src="../../Scripts/the_gates.js"></script>
  <script src="../../Data/the_way_daily.js"></script>
  <script src="the_way.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../../sw.js').catch(() => {});
    }
  </script>
</body>
</html>
