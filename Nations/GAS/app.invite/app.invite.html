<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Absolute base so all relative URLs resolve to GitHub Pages regardless of host -->
  <base href="https://flock-os.github.io/FlockOS/New_Covenant/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no, date=no, email=no, address=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="The Invitation">
  <meta name="theme-color" content="#3d8b4f">
  <meta name="description" content="A hope-filled look at Jesus Christ — His invitations, His identity, and His finished work.">

  <title>The Invitation</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Icons — absolute path so they work from any host -->
  <link rel="icon" type="image/png" href="https://flock-os.github.io/FlockOS/New_Covenant/Images/Invite.png">
  <link rel="apple-touch-icon" href="https://flock-os.github.io/FlockOS/New_Covenant/Images/Invite.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

  <!-- Shared styles (resolved via absolute base) -->
  <link rel="stylesheet" href="Styles/american_garments.css">
  <link rel="stylesheet" href="Styles/new_covenant.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0; padding: 0;
      background: var(--bg, #f7f8fb);
      color: var(--ink, #1b264f);
      font-family: var(--font-ui, 'Plus Jakarta Sans', sans-serif);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Minimal topbar ─────────────────────────────────────────── */
    #inv-topbar {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(90deg, #0c1445 0%, #14103a 60%, #0a1128 100%);
      height: calc(52px + var(--safe-top, 0px));
      padding: var(--safe-top, 0px) 20px 0;
      display: flex; align-items: center; gap: 14px;
      border-bottom: 1.5px solid rgba(232,168,56,.22);
      box-shadow: 0 2px 12px rgba(12,20,69,.35);
    }
    .inv-brand-icon {
      width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
      background: rgba(61,139,79,.28); border: 1.5px solid rgba(61,139,79,.55);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.15rem;
    }
    .inv-brand-name {
      font: 700 1rem var(--font-ui, sans-serif);
      color: #fff; letter-spacing: -.01em;
    }
    .inv-brand-church {
      font: 500 .78rem var(--font-ui, sans-serif);
      color: rgba(255,255,255,.55); margin-left: 2px;
    }
    .inv-topbar-right { margin-left: auto; }
    .inv-share-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 999px;
      background: rgba(61,139,79,.25); border: 1.5px solid rgba(61,139,79,.55);
      color: #6ee7b7; font: 600 .8rem var(--font-ui, sans-serif);
      cursor: pointer; transition: background .18s;
    }
    .inv-share-pill:hover { background: rgba(61,139,79,.4); }

    /* ── Scroll area ────────────────────────────────────────────── */
    #inv-main {
      padding: 0 0 env(safe-area-inset-bottom, 24px);
    }
    #inv-main > * {
      max-width: 860px;
      margin-left: auto;
      margin-right: auto;
    }
    /* grow-page needs padding since we removed the GROW shell's #gp-main padding */
    .grow-page {
      padding: 0 20px 48px;
    }
    @media (min-width: 600px) {
      .grow-page { padding: 0 28px 64px; }
    }
    /* Hero sits full-bleed edge to edge in the invitation */
    [data-grow="the_gospel_invitation"] .grow-hero {
      margin-left: -20px; margin-right: -20px;
    }
    @media (min-width: 600px) {
      [data-grow="the_gospel_invitation"] .grow-hero {
        margin-left: -28px; margin-right: -28px;
      }
    }

    /* ── Loading state ──────────────────────────────────────────── */
    #inv-loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh; flex-direction: column; gap: 16px;
      color: var(--ink-muted, #7a7f96); font: .95rem var(--font-ui, sans-serif);
    }
    .inv-spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--line, #e5e7ef);
      border-top-color: #3d8b4f;
      border-radius: 50%;
      animation: inv-spin .7s linear infinite;
    }
    @keyframes inv-spin { to { transform: rotate(360deg); } }

    /* ── SW update banner ───────────────────────────────────────── */
    #inv-sw-banner {
      display: none;
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #0c1445; color: #fff; border-radius: 12px;
      padding: 12px 20px; font: .88rem var(--font-ui, sans-serif);
      box-shadow: 0 6px 24px rgba(12,20,69,.4);
      z-index: 999; gap: 12px; align-items: center;
      border: 1.5px solid rgba(61,139,79,.4);
    }
    #inv-sw-banner.visible { display: flex; }
    #inv-sw-reload {
      background: #3d8b4f; color: #fff; border: none; border-radius: 8px;
      padding: 6px 14px; font: 600 .82rem var(--font-ui, sans-serif); cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- ── Topbar ──────────────────────────────────────────────────── -->
  <header id="inv-topbar" role="banner">
    <div class="inv-brand-icon">✉️</div>
    <div>
      <div class="inv-brand-name">The Invitation</div>
      <div class="inv-brand-church" id="inv-church-name"></div>
    </div>
    <div class="inv-topbar-right">
      <button class="inv-share-pill" id="inv-topbar-share" aria-label="Share this page">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share
      </button>
    </div>
  </header>

  <!-- ── Content ─────────────────────────────────────────────────── -->
  <main id="inv-main" role="main">
    <div id="inv-loading">
      <div class="inv-spinner"></div>
      Loading…
    </div>
    <div id="inv-root"></div>
  </main>

  <!-- ── SW update banner ────────────────────────────────────────── -->
  <div id="inv-sw-banner" role="status" aria-live="polite">
    New version available
    <button id="inv-sw-reload">Refresh</button>
  </div>

  <!-- Firebase config — patched per-church by B-Build -->

  <!-- Firebase (for church map / Come Join Us Firestore reads) -->

  <!-- Standalone invite boot -->
  <script>
    /* Share URL = this page itself (so the recipient opens the same standalone invite) */
    window._INVITE_SHARE_URL = location.href.split('?')[0].split('#')[0];
  </script>

  <script type="module" src="https://flock-os.github.io/FlockOS/New_Covenant/Scripts/the_gospel/the_gospel_invitation.js">
  </script>
  <script type="module">
    import { render, mount } from 'https://flock-os.github.io/FlockOS/New_Covenant/Scripts/the_gospel/the_gospel_invitation.js';

    const root    = document.getElementById('inv-root');
    const loading = document.getElementById('inv-loading');

    /* Render invitation content */
    root.innerHTML = render();
    loading.remove();

    /* Mount interactivity */
    mount(root);

    /* ── Topbar share pill ──────────────────────────────────────── */
    document.getElementById('inv-topbar-share')?.addEventListener('click', () => {
      const url = window._INVITE_SHARE_URL || location.href;
      const msg = 'I thought you\u2019d appreciate this \u2014 a hope-filled look at Jesus Christ:';
      if (navigator.share) {
        navigator.share({ title: 'A Hope-Filled View of Jesus Christ', text: msg, url }).catch(() => {});
      } else {
        navigator.clipboard?.writeText(url).catch(() => {});
        window.location.href = `sms:?body=${encodeURIComponent(msg + '\n' + url)}`;
      }
    });

    /* ── Church name in topbar ──────────────────────────────────── */
    (async () => {
      try {
        const cfg = window.FLOCK_FIREBASE_CONFIG;
        const fb  = window.firebase;
        if (!fb || !cfg) return;
        const appName = 'invite-church-info';
        const app = fb.apps.find(a => a.name === appName) || fb.initializeApp(cfg, appName);
        const db  = app.firestore();
        const doc = await db.collection('appConfig').doc('church_name').get();
        const name = doc.exists ? (doc.data().value || '').trim() : '';
        if (name) document.getElementById('inv-church-name').textContent = name;
      } catch (_) {}
    })();

    /* ── Service worker ─────────────────────────────────────────── */
    if ('serviceWorker' in navigator) {
      import('https://flock-os.github.io/FlockOS/New_Covenant/Scripts/the_living_water_register.js')
        .then(m => m.register())
        .catch(() => {});
    }
  </script>

</body>
</html>
