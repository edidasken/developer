  <title>The Sanctuary — The Flock Herald</title>
  <script>

      var s = localStorage.getItem('flock_font_scale');
      if (s) document.documentElement.style.setProperty('--fn-scale', s);

  <link rel="stylesheet" href="../../Styles/the_broadsheet.css">
