<!DOCTYPE html>
<html lang="en" class="sec-herald">
<head>
  <script>
    window.FLOCK_FIREBASE_CONFIG = null;
    window.HERALD_CHURCH_NAME = "FlockOS";
    window.HERALD_CHURCH_ID   = "flockos";
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>The Herald — The Flock Herald</title>
  <script>
    // Flash prevention — restore font scale before paint
    (function() {
      var s = localStorage.getItem('flock_font_scale');
      if (s) document.documentElement.style.setProperty('--fn-scale', s);
    })();
  </script>
  <link rel="stylesheet" href="../../Styles/the_broadsheet.css">
  <link rel="stylesheet" href="../../Styles/sections/herald.css">
  <link rel="manifest" href="../../manifest.json">
</head>
<body class="broadsheet-page sec-herald">

  <!-- Masthead — newspaper nameplate -->
  <header class="sec-masthead" role="banner">

    <!-- Aa button: absolute top-right, safe area aware -->
    <button class="sec-masthead__font-btn herald-aa-btn" id="font-scale-btn" aria-label="Adjust text size" type="button">Aa</button>

    <!-- Compact mini-nameplate — revealed when scrolled -->
    <div class="herald-compact-folio">
      <div class="herald-compact__center">
        <h2 class="herald-compact__title">The Flock Herald</h2>
        <p class="herald-compact__date" id="herald-compact-date"></p>
      </div>
    </div>
    <div class="herald-compact-rule" aria-hidden="true"></div>

    <!-- Nameplate -->
    <div class="herald-nameplate">
      <h1 class="herald-nameplate__title">The Flock Herald</h1>
      <p class="herald-nameplate__date" id="herald-date">Loading…</p>
    </div>

    <!-- Decorative ornament — permanent, shows in both landing and compact -->
    <svg class="herald-ornament" viewBox="0 0 400 16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <line x1="0" y1="8" x2="168" y2="8" stroke="var(--gold)" stroke-width="0.75"/>
      <path d="M171 5 L175 8 L171 11 L167 8 Z" fill="var(--gold)"/>
      <path d="M200 2 L208 8 L200 14 L192 8 Z" fill="var(--gold)"/>
      <rect x="198.5" y="2" width="3" height="12" fill="var(--paper-card)"/>
      <rect x="192" y="6.5" width="16" height="3" fill="var(--paper-card)"/>
      <path d="M229 5 L233 8 L229 11 L225 8 Z" fill="var(--gold)"/>
      <line x1="232" y1="8" x2="400" y2="8" stroke="var(--gold)" stroke-width="0.75"/>
    </svg>

  </header>

  <!-- Section Nav Bar — scrolls with page content, below fixed header -->
  <nav class="sec-nav-bar" role="navigation" aria-label="Herald sections" id="sec-nav"></nav>

  <!-- Main content — broadsheet newspaper layout -->
  <main class="broadsheet-columns" id="herald-grid" role="main">
    <!-- Main column: Lead · OYB · Announcements · Prayer Spotlight -->
    <div class="broadsheet-col broadsheet-col--main" id="herald-main" aria-live="polite" aria-label="Main stories">
      <div class="broadsheet-story-loading" aria-hidden="true"></div>
      <div class="broadsheet-story-loading" style="height:120px" aria-hidden="true"></div>
    </div>
    <!-- Aside column: Nation · Heart Check · Quiz -->
    <div class="broadsheet-col broadsheet-col--aside" id="herald-aside" aria-live="polite" aria-label="Aside features">
      <div class="broadsheet-story-loading" style="height:200px" aria-hidden="true"></div>
    </div>
  </main>

  <!-- Right Drawer (global) -->
  <aside class="right-drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title">
    <header class="drawer-header">
      <h2 id="drawer-title" class="drawer-title"></h2>
      <button class="drawer-close" type="button" aria-label="Close">&#x2715;</button>
    </header>
    <div class="drawer-body" id="drawer-body"></div>
  </aside>
  <div class="drawer-backdrop" aria-hidden="true"></div>

  <!-- Toast layer -->
  <div class="toast-layer" id="toast-layer" aria-live="polite" aria-atomic="true"></div>

  <!-- Script load order: the_true_vine → firm_foundation → auth guard → the_adornment → the_gates → section script -->
  <script>
    (function() {
      var masthead = document.querySelector('.sec-masthead');
      if (!masthead) return;

      function updatePadding() {
        document.body.style.paddingTop = masthead.offsetHeight + 'px';
      }

      function onScroll() {
        // compact collapse disabled — nameplate stays full size always
      }

      window.addEventListener('scroll', onScroll, { passive: true });
      window.addEventListener('resize', updatePadding);
      if (document.fonts) {
        document.fonts.ready.then(updatePadding);
      } else {
        setTimeout(updatePadding, 300);
      }
      updatePadding();
      onScroll();

      var fmt = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
      var dateStr = new Date().toLocaleDateString('en-US', fmt).toUpperCase();
      var d = document.getElementById('herald-date');
      if (d) d.textContent = dateStr;
      var cd = document.getElementById('herald-compact-date');
      if (cd) cd.textContent = dateStr;
    })();
  </script>
  <script src="../../Scripts/the_true_vine.js"></script>
  <script src="../../Scripts/firm_foundation.js"></script>
  <script>
    // Inline auth guard — Herald is public, no redirect needed
    // Nehemiah.enableLocalBypass() in console for dev
    window._HERALD_AUTH_LEVEL = -1; // public
  </script>
  <script src="../../Scripts/the_adornment.js"></script>
  <script src="../../Scripts/the_gates.js"></script>
  <script src="the_proclamation.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../../sw.js').catch(() => {});
    }
  </script>
</body>
</html>
