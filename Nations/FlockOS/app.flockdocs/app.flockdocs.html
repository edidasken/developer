<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Resolve all relative paths from the parent New_Covenant/ directory -->
  <base href="../">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no, date=no, email=no, address=no">
  <title>FlockDocs — Productivity Suite</title>

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="Images/icon-flockos.svg">
  <link rel="apple-touch-icon" href="Images/FlockIcon-512.webp">

  <!-- PWA manifest -->
  <link rel="manifest" href="app.flockdocs/manifest.json">

  <!-- PWA meta -->
  <meta name="theme-color" content="#3b82f6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FlockDocs">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- SEO -->
  <meta name="description" content="FlockDocs — Productivity suite for your church. Word processor, spreadsheets, and document management.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Flash prevention: apply saved FlockOS theme before first paint -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('flock_theme') || 'america';
        document.documentElement.setAttribute('data-theme', t);
      } catch (_) {
        document.documentElement.setAttribute('data-theme', 'america');
      }
    })();
  </script>

  <!-- Styles — new_covenant.css contains all shared styles -->
  <link rel="stylesheet" href="Styles/new_covenant.css">

  <!-- App-specific styles -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    
    html, body {
      height: 100dvh; margin: 0; padding: 0;
      color: var(--ink);
      overflow: hidden;
      overscroll-behavior: none;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    }
    body { background: var(--fd-bg, #f5f0e4); }

    /* ── Shell grid ──────────────────────────────────────────────────────── */
    .fd-wrap {
      display: grid;
      grid-template-areas: "top top" "side main" "foot foot";
      grid-template-columns: var(--sidebar-w, 256px) 1fr;
      grid-template-rows: auto 1fr auto;
      height: 100dvh;
      position: relative;
    }
    #fd-topbar       { grid-area: top; }
    #fd-sidebar-wrap { grid-area: side; overflow-y: auto; overflow-x: hidden; }
    #fd-main         { grid-area: main; overflow-y: auto; overflow-x: hidden; position: relative; background: var(--fd-bg); }
    #fd-footer       { grid-area: foot; }

    /* Mobile: collapse sidebar */
    @media (max-width: 768px) {
      .fd-wrap {
        grid-template-areas: "top top" "main main" "foot foot";
        grid-template-columns: 1fr;
      }
      #fd-sidebar-wrap {
        position: fixed; top: calc(var(--topbar-h, 60px) + var(--safe-top, 0px));
        left: 0; bottom: 0; width: 280px;
        background: var(--fd-side-bg);
        border-right: 1px solid var(--fd-side-line);
        z-index: 300;
        transform: translateX(-100%);
        transition: transform 240ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      #fd-sidebar-wrap.is-open { transform: translateX(0); }
    }

    /* ── Topbar (handled by unity-header; no custom styling needed) ──── */

    /* ── FlockDocs design tokens — matching FlockStand/FlockShow pattern ── */
    :root {
      --fd-sidebar-w:   220px;
      --fd-gold:        #e8a838;
      --fd-gold-soft:   rgba(232,168,56,0.13);
      --fd-side-bg:     linear-gradient(90deg, #0c1445 0%, #14103a 60%, #0a1128 100%);
      --fd-side-line:   rgba(255,255,255,0.08);
      --fd-side-ink:    rgba(255,255,255,0.62);
      --fd-side-ink-hi: rgba(255,255,255,0.92);
      --fd-panel:       linear-gradient(135deg, #0f1735 0%, #1b264f 100%);
      --fd-border:      rgba(255,255,255,0.10);
      --fd-bg:          #f5f0e4;  /* Cream page background */
      --sidebar-w:      var(--fd-sidebar-w);
    }

    /* ── Sidebar — canonical FlockOS dark navy chrome ──── */
    #fd-sidebar {
      width: 100%;
      background: var(--fd-side-bg) !important;
      border-right: 1px solid var(--fd-side-line);
      color: var(--fd-side-ink);
      overflow-y: auto; overflow-x: hidden;
      display: flex; flex-direction: column;
      padding: 12px 8px;
      gap: 4px;
      height: 100%;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.10) transparent;
    }
    #fd-sidebar::-webkit-scrollbar { width: 4px; }
    #fd-sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

    .fd-sidebar-section { display: flex; flex-direction: column; gap: 2px; margin-bottom: 16px; }
    .fd-sidebar-section--bottom {
      margin-top: auto;
      border-top: 1px solid var(--fd-side-line);
      padding-top: 12px;
    }

    .fd-sidebar-title {
      font-size: .68rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      color: rgba(255,255,255,0.28); padding: 10px 10px 4px; user-select: none;
    }

    .fd-sidebar-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 10px;
      background: none; border: none; cursor: pointer;
      color: var(--fd-side-ink);
      font-size: .88rem; font-weight: 500; font-family: var(--font-ui);
      text-align: left; width: 100%; transition: all .15s;
      white-space: nowrap;
    }
    .fd-sidebar-btn:hover {
      background: rgba(255,255,255,0.07);
      color: var(--fd-side-ink-hi);
    }
    .fd-sidebar-btn.is-active {
      background: var(--fd-gold-soft);
      color: var(--fd-gold);
      font-weight: 600;
    }
    .fd-sidebar-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .fd-folder-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px 8px 28px;
      color: var(--fd-side-ink); font: 500 0.875rem var(--font-ui);
      cursor: pointer; border-radius: 8px;
      transition: all .15s;
    }
    .fd-folder-item:hover { 
      background: rgba(255,255,255,0.07); 
      color: var(--fd-side-ink-hi);
    }
    .fd-folder-item svg { width: 16px; height: 16px; }

    /* ── Main content area ───────────────────────────────────────────────── */
    .fd-library-view {
      padding: 28px 32px 80px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .fd-library-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
      margin-bottom: 28px;
      padding: 18px 22px;
      background: var(--fd-panel);
      border: 1px solid var(--fd-border);
      border-radius: 14px;
      position: relative;
      overflow: hidden;
    }
    .fd-library-header::before {
      content: ""; position: absolute; left: 0; right: 0; top: 0; height: 2.5px;
      background: linear-gradient(90deg, #38bdf8 0%, #818cf8 28%, #a78bfa 52%, #e8a838 78%, #34d399 100%);
      opacity: 0.92;
    }

    .fd-library-title {
      font: 800 1.5rem var(--font-ui);
      color: #ffffff;
      margin: 0;
      letter-spacing: -.02em;
    }

    .fd-search-box {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      width: 300px;
      transition: all .15s;
    }
    .fd-search-box:focus-within {
      background: rgba(255,255,255,0.12);
      border-color: var(--fd-gold);
    }
    .fd-search-box svg { width: 18px; height: 18px; color: rgba(255,255,255,0.45); }
    .fd-search-box input {
      flex: 1; border: 0; background: transparent;
      color: #ffffff; font: 500 0.875rem var(--font-ui);
      outline: none;
    }
    .fd-search-box input::placeholder { color: rgba(255,255,255,0.45); }

    /* Document grid */
    .fd-doc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
    }

    .fd-doc-card {
      background: var(--fd-panel);
      border: 1px solid var(--fd-border);
      border-radius: 12px;
      padding: 18px;
      cursor: pointer;
      transition: all .15s;
      position: relative;
    }
    .fd-doc-card:hover {
      border-color: var(--fd-gold);
      box-shadow: 0 8px 24px rgba(232,168,56,0.15);
      transform: translateY(-2px);
    }

    .fd-doc-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--fd-gold), #c48a20);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
      box-shadow: 0 4px 12px rgba(232,168,56,0.25);
    }
    .fd-doc-icon svg { width: 24px; height: 24px; color: #1a1208; }

    .fd-doc-name {
      font: 600 0.938rem var(--font-ui);
      color: #ffffff;
      margin: 0 0 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fd-doc-meta {
      font: 500 0.75rem var(--font-ui);
      color: rgba(255,255,255,0.55);
    }

    .fd-doc-menu-btn {
      position: absolute;
      top: 12px; right: 12px;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
      border: 0; border-radius: 6px;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      opacity: 0;
      transition: opacity .15s, background .15s;
    }
    .fd-doc-card:hover .fd-doc-menu-btn { opacity: 1; }
    .fd-doc-menu-btn:hover { background: rgba(255,255,255,0.10); color: #ffffff; }

    /* Empty state */
    .fd-empty-state {
      text-align: center;
      padding: 80px 20px;
    }
    .fd-empty-state svg {
      width: 80px; height: 80px;
      color: rgba(255,255,255,0.35);
      opacity: 0.5;
      margin: 0 auto 20px;
    }
    .fd-empty-state h3 {
      font: 600 1.25rem var(--font-ui);
      color: #ffffff;
      margin: 0 0 8px;
    }
    .fd-empty-state p {
      font: 500 0.938rem var(--font-ui);
      color: rgba(255,255,255,0.55);
      margin: 0 0 24px;
    }

    /* Buttons — matching FlockStand/FlockShow pattern */
    .fd-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 10px;
      border: none; cursor: pointer; font-family: var(--font-ui);
      font-size: .85rem; font-weight: 600; text-decoration: none;
      transition: all .15s; white-space: nowrap;
    }
    .fd-btn--primary {
      background: var(--fd-gold); color: #1a1208;
      box-shadow: 0 4px 12px rgba(232,168,56,0.25);
    }
    .fd-btn--primary:hover { background: #f0b845; }
    .fd-btn--ghost {
      background: rgba(255,255,255,0.07); color: #ffffff;
      border: 1px solid rgba(255,255,255,0.14);
    }
    .fd-btn--ghost:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.25);
    }
    .fd-btn--danger {
      background: rgba(248,113,113,0.15); color: #ef4444;
      border: 1px solid rgba(248,113,113,0.25);
    }
    .fd-btn--danger:hover { background: rgba(248,113,113,0.25); }
    .fd-btn--sm { padding: 6px 12px; font-size: .8rem; }
    .fd-btn:disabled { opacity: 0.35; pointer-events: none; }

    /* ── Editor view ─────────────────────────────────────────────────────── */
    .fd-editor-view {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: var(--bg);
    }

    .fd-editor-toolbar {
      display: flex; align-items: center; gap: 4px;
      padding: 12px 20px;
      background: var(--fd-panel);
      border-bottom: 1px solid var(--fd-border);
      flex-wrap: wrap;
    }

    .fd-toolbar-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      background: transparent; border: 0; border-radius: 8px;
      color: rgba(255,255,255,0.62);
      cursor: pointer;
      transition: all .15s;
    }
    .fd-toolbar-btn:hover {
      background: rgba(255,255,255,0.10);
      color: #ffffff;
    }
    .fd-toolbar-btn.is-active {
      background: var(--fd-gold-soft);
      color: var(--fd-gold);
    }
    .fd-toolbar-btn svg { width: 18px; height: 18px; }

    .fd-toolbar-divider {
      width: 1px; height: 24px;
      background: rgba(255,255,255,0.10);
      margin: 0 8px;
    }

    .fd-toolbar-select {
      padding: 6px 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #ffffff;
      font: 500 0.875rem var(--font-ui);
      cursor: pointer;
      outline: none;
      transition: all .15s;
    }
    .fd-toolbar-select:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.22);
    }

    .fd-editor-container {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      background: var(--bg);
    }

    .fd-editor-page {
      max-width: 816px;
      min-height: 1056px;
      margin: 0 auto;
      padding: 96px 96px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      color: #1f2937;
      font: 400 16px/1.6 'Noto Serif', Georgia, serif;
    }

    .fd-editor-content {
      outline: none;
      min-height: 600px;
    }

    .fd-editor-content h1 {
      font: 700 2rem/1.3 var(--font-ui);
      margin: 0 0 16px;
      color: #111827;
    }

    .fd-editor-content h2 {
      font: 700 1.5rem/1.4 var(--font-ui);
      margin: 32px 0 12px;
      color: #111827;
    }

    .fd-editor-content h3 {
      font: 600 1.25rem/1.4 var(--font-ui);
      margin: 24px 0 8px;
      color: #111827;
    }

    .fd-editor-content p {
      margin: 0 0 16px;
    }

    .fd-editor-content ul, .fd-editor-content ol {
      margin: 0 0 16px;
      padding-left: 32px;
    }

    .fd-editor-content li {
      margin-bottom: 8px;
    }

    /* Hidden utility */
    .hidden { display: none !important; }

    /* Footer */
    #fd-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px calc(16px + var(--safe-bottom, 0px));
      background: var(--bg-raised);
      border-top: 1px solid var(--line);
      font: 500 0.813rem var(--font-ui);
      color: var(--ink-muted);
    }
  </style>
</head>
<body>

  <!-- Auth gate placeholder (will be injected by firm_foundation.js) -->
  <div id="auth-gate"></div>

  <!-- Main app shell -->
  <div class="fd-wrap" id="fd-app">
    
    <!-- Topbar (unity header mounted by JS) -->
    <header class="unity-header" id="fd-topbar" role="banner"></header>

    <!-- Sidebar -->
    <div id="fd-sidebar-wrap">
      <div id="fd-sidebar">
        
        <div class="fd-sidebar-section">
          <div class="fd-sidebar-title">Library</div>
          <button class="fd-sidebar-btn is-active" data-view="all-docs">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            All Documents
          </button>
          <button class="fd-sidebar-btn" data-view="my-docs">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            My Documents
          </button>
          <button class="fd-sidebar-btn" data-view="shared-docs">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            Shared with Church
          </button>
          <button class="fd-sidebar-btn" data-view="recent">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            Recent
          </button>
        </div>

        <div class="fd-sidebar-section">
          <div class="fd-sidebar-title">Folders</div>
          <div id="fd-folders-list">
            <!-- Folders will be injected here -->
          </div>
        </div>

        <div class="fd-sidebar-section">
          <button class="fd-sidebar-btn" data-view="trash">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
            Trash
          </button>
        </div>

      </div>
    </div>

    <!-- Main content -->
    <div id="fd-main">
      
      <!-- Library view -->
      <div class="fd-library-view" id="fd-library-view">
        <div class="fd-library-header">
          <h1 class="fd-library-title" id="fd-library-title">All Documents</h1>
          <div class="fd-search-box">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input type="text" placeholder="Search documents..." id="fd-search-input">
          </div>
        </div>

        <div id="fd-doc-list">
          <!-- Documents will be injected here -->
          <div class="fd-empty-state">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <h3>No documents yet</h3>
            <p>Create your first document to get started</p>
            <button class="fd-btn" onclick="FlockDocs.createNewDocument()">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              Create Document
            </button>
          </div>
        </div>
      </div>

      <!-- Editor view -->
      <div class="fd-editor-view hidden" id="fd-editor-view">
        <div class="fd-editor-toolbar">
          <button class="fd-toolbar-btn" data-action="back" title="Back to library">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
          </button>

          <div class="fd-toolbar-divider"></div>

          <select class="fd-toolbar-select" id="fd-format-select">
            <option value="p">Paragraph</option>
            <option value="h1">Heading 1</option>
            <option value="h2">Heading 2</option>
            <option value="h3">Heading 3</option>
          </select>

          <div class="fd-toolbar-divider"></div>

          <button class="fd-toolbar-btn" data-format="bold" title="Bold">
            <svg fill="currentColor" viewBox="0 0 24 24">
              <path d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM10 6.5h3c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-3v-3zm3.5 9H10v-3h3.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5z"/>
            </svg>
          </button>

          <button class="fd-toolbar-btn" data-format="italic" title="Italic">
            <svg fill="currentColor" viewBox="0 0 24 24">
              <path d="M10 4v3h2.21l-3.42 8H6v3h8v-3h-2.21l3.42-8H18V4z"/>
            </svg>
          </button>

          <button class="fd-toolbar-btn" data-format="underline" title="Underline">
            <svg fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 17c3.31 0 6-2.69 6-6V3h-2.5v8c0 1.93-1.57 3.5-3.5 3.5S8.5 12.93 8.5 11V3H6v8c0 3.31 2.69 6 6 6zm-7 2v2h14v-2H5z"/>
            </svg>
          </button>

          <div class="fd-toolbar-divider"></div>

          <button class="fd-toolbar-btn" data-format="insertUnorderedList" title="Bullet list">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>

          <button class="fd-toolbar-btn" data-format="insertOrderedList" title="Numbered list">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
