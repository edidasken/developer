<!DOCTYPE html>
<html lang="en" data-theme="broadsheet">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="theme-color" content="#faf6ed">
  <title>The Family — The Flock Herald</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="../../Styles/the_broadsheet.css">
  <link rel="stylesheet" href="../../Styles/sections/family.css">
  <script>
    (function () {
      try {
        var s = parseFloat(localStorage.getItem('flock_font_scale') || '1');
        if (s >= 0.85 && s <= 1.25) document.documentElement.style.setProperty('--fn-scale', s);
        var t = localStorage.getItem('flock_theme') || 'broadsheet';
        document.documentElement.setAttribute('data-theme', t);
      } catch (_) {}
    })();
  </script>
</head>
<body>
  <nav class="sec-nav-bar" id="sec-nav" aria-label="Paper sections"></nav>

  <main class="np-page" id="section-main">

    <div class="np-section-banner">
      <p class="np-section-banner__flag">The Flock Herald &mdash; Congregation</p>
      <h1 class="np-section-banner__title">The Family</h1>
      <p class="np-section-banner__deck">Members &middot; Households &middot; The generations of the church</p>
      <span class="np-section-banner__accent" style="background:var(--sec-family,#1a3030)"></span>
    </div>

    <div class="np-panels">

      <details class="np-panel" id="accordion-family" open>
        <summary class="np-panel__hdr">
          <span class="np-panel__icon">&#128106;</span>
          <span class="np-panel__title">Family Tree</span>
          <span class="np-panel__meta">Congregation &amp; household records</span>
          <span class="np-panel__caret">&#9656;</span>
        </summary>
        <div class="np-panel__body" id="panel-family"></div>
      </details>

    </div><!-- .np-panels -->
  </main>

  <script src="../../Scripts/the_true_vine.js"></script>
  <script src="../../Scripts/firm_foundation.js"></script>
  <script>
    (function () {
      if (typeof Nehemiah !== 'undefined') {
        Nehemiah.guard();
      }
    })();
  </script>
  <script src="../../Scripts/the_adornment.js"></script>
  <script src="../../Scripts/the_gates.js?v=2"></script>
  <script src="../../Data/genealogy.js"></script>
  <script src="../../Scripts/the_family_tree.js?v=2"></script>
</body>
</html>
