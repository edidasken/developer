<!DOCTYPE html>
<html lang="en" class="sec-herald">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>The Herald — The Flock Herald</title>
  <script>
    // Flash prevention — restore font scale before paint
    (function() {
      var s = localStorage.getItem('flock_font_scale');
      if (s) document.documentElement.style.setProperty('--fn-scale', s);
    })();
  </script>
  <link rel="stylesheet" href="../../Styles/the_broadsheet.css">
  <link rel="stylesheet" href="../../Styles/sections/herald.css">
  <link rel="manifest" href="../../manifest.json">
</head>
<body class="broadsheet-page sec-herald">

  <!-- Masthead — newspaper nameplate -->
  <header class="sec-masthead" role="banner">

    <!-- Folio row: church label · date · Aa -->
    <div class="herald-folio">
      <span class="herald-folio__label">Powered By FlockOS</span>
      <span class="herald-folio__date" id="herald-date">Loading…</span>
      <span class="herald-folio__btn">
        <button class="sec-masthead__font-btn" id="font-scale-btn" aria-label="Adjust text size" type="button">Aa</button>
      </span>
    </div>

    <!-- Double rule -->
    <div class="herald-nameplate-rule" aria-hidden="true"></div>

    <!-- Nameplate -->
    <div class="herald-nameplate">
      <h1 class="herald-nameplate__title">The Flock Herald</h1>
      <p class="herald-nameplate__tagline">Shepherding the Flock by the Power of the Word</p>
    </div>

    <!-- Closing rule -->
    <div class="herald-masthead-rule" aria-hidden="true"></div>

    <!-- Section Nav Bar -->
    <nav class="sec-nav-bar" role="navigation" aria-label="Herald sections" id="sec-nav">
      <!-- Tabs injected by the_gates.js -->
    </nav>
  </header>

  <!-- Main content — broadsheet newspaper layout -->
  <main class="broadsheet-columns" id="herald-grid" role="main">
    <!-- Main column: Lead · OYB · Announcements · Prayer Spotlight -->
    <div class="broadsheet-col broadsheet-col--main" id="herald-main" aria-live="polite" aria-label="Main stories">
      <div class="broadsheet-story-loading" aria-hidden="true"></div>
      <div class="broadsheet-story-loading" style="height:120px" aria-hidden="true"></div>
    </div>
    <!-- Aside column: Nation · Heart Check · Quiz -->
    <div class="broadsheet-col broadsheet-col--aside" id="herald-aside" aria-live="polite" aria-label="Aside features">
      <div class="broadsheet-story-loading" style="height:200px" aria-hidden="true"></div>
    </div>
  </main>

  <!-- Right Drawer (global) -->
  <aside class="right-drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title">
    <header class="drawer-header">
      <h2 id="drawer-title" class="drawer-title"></h2>
      <button class="drawer-close" type="button" aria-label="Close">&#x2715;</button>
    </header>
    <div class="drawer-body" id="drawer-body"></div>
  </aside>
  <div class="drawer-backdrop" aria-hidden="true"></div>

  <!-- Toast layer -->
  <div class="toast-layer" id="toast-layer" aria-live="polite" aria-atomic="true"></div>

  <!-- Script load order: the_true_vine → firm_foundation → auth guard → the_adornment → the_gates → section script -->
  <script src="../../Scripts/the_true_vine.js"></script>
  <script src="../../Scripts/firm_foundation.js"></script>
  <script>
    // Inline auth guard — Herald is public, no redirect needed
    // Nehemiah.enableLocalBypass() in console for dev
    window._HERALD_AUTH_LEVEL = -1; // public
  </script>
  <script src="../../Scripts/the_adornment.js"></script>
  <script src="../../Scripts/the_gates.js"></script>
  <script src="the_proclamation.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../../sw.js').catch(() => {});
    }
  </script>
</body>
</html>
